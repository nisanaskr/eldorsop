<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eldor SOP Oluşturucu - Yerel Kontrol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- PDF Kütüphanesi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- QR Kod Kütüphanesi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <!-- Google API Kütüphaneleri -->
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .canvas-container { position: relative; display: inline-block; cursor: crosshair; width: 100%; }
        canvas { display: block; max-width: 100%; height: auto; border-radius: 12px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .marker { position: absolute; width: 28px; height: 28px; background: rgba(239, 68, 68, 0.95); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; transform: translate(-50%, -50%); border: 2px solid white; pointer-events: auto; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); z-index: 10; transition: transform 0.2s; }
        .marker:hover { transform: translate(-50%, -50%) scale(1.2); }
        .blue-marker { position: absolute; width: 28px; height: 28px; background: rgba(59, 130, 246, 0.95); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; transform: translate(-50%, -50%); border: 2px solid white; pointer-events: auto; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); z-index: 9; transition: transform 0.2s; }
        .blue-marker:hover { transform: translate(-50%, -50%) scale(1.2); }
        .tool-btn.active { background-color: #000080; color: white; border-color: #000080; }
        .tab-btn.active { border-bottom: 3px solid #000080; color: #000080; font-weight: 700; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        
        #customModal { display: none; }
        #qrContainer canvas { margin: 0 auto; border: 8px solid white; border-radius: 12px; }

        #loginScreen {
            background: linear-gradient(135deg, #000080 0%, #000044 100%);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Giriş Ekranı -->
    <div id="loginScreen" class="fixed inset-0 z-[8000] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl p-10 shadow-2xl space-y-8">
            <div class="text-center space-y-3">
                <div class="w-20 h-20 bg-blue-50 rounded-2xl mx-auto flex items-center justify-center mb-4">
                    <i data-lucide="lock" class="w-10 h-10 text-[#000080]"></i>
                </div>
                <h2 class="text-3xl font-bold text-slate-900">Eldor SOP Paneli</h2>
                <p class="text-slate-500">Yönetici kimlik bilgilerinizle giriş yapın.</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-600 uppercase tracking-wider">Kullanıcı Adı</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-4 top-3.5 w-5 h-5 text-slate-400"></i>
                        <input type="text" id="usernameInput" required class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Kullanıcı adı girin">
                    </div>
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-600 uppercase tracking-wider">Şifre</label>
                    <div class="relative">
                        <i data-lucide="key-round" class="absolute left-4 top-3.5 w-5 h-5 text-slate-400"></i>
                        <input type="password" id="passwordInput" required class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="••••••••">
                    </div>
                </div>
                <div id="loginError" class="hidden text-red-500 text-sm font-medium text-center bg-red-50 py-2 rounded-lg">
                    Hatalı kullanıcı adı veya şifre!
                </div>
                <button type="submit" class="w-full py-4 bg-[#000080] text-white rounded-xl font-bold shadow-xl hover:bg-blue-900 transition-all flex items-center justify-center gap-3 active:scale-95">
                    Giriş Yap <i data-lucide="chevron-right" class="w-5 h-5"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- İşlem Göstergesi -->
    <div id="loading" class="loading-overlay hidden">
        <div class="w-14 h-14 border-4 border-[#000080] border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-[#000080] text-lg" id="loadingText">İşlem Yapılıyor...</p>
    </div>

    <!-- Mesaj Kutusu (Modal) -->
    <div id="customModal" class="fixed inset-0 bg-black/60 z-[9000] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white rounded-3xl max-w-md w-full p-8 shadow-2xl transform transition-all">
            <div class="text-center">
                <div id="modalIconContainer" class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-6">
                    <i id="modalIcon" data-lucide="check" class="h-8 w-8 text-green-600"></i>
                </div>
                <h3 id="modalTitle" class="text-2xl font-bold mb-3 text-slate-900">Başarılı</h3>
                <p id="modalMessage" class="text-slate-500 mb-8 leading-relaxed">İşlem tamamlandı.</p>
                
                <div id="qrSection" class="hidden mb-8 p-6 bg-slate-50 rounded-2xl border border-slate-100">
                    <div id="qrContainer" class="flex flex-col justify-center items-center mb-4"></div>
                    <p class="text-[10px] text-slate-400 mb-4 break-all bg-white p-2 rounded border" id="qrLinkText"></p>
                    <button id="downloadQrBtn" class="w-full py-3 bg-white border border-slate-200 rounded-xl text-sm font-bold flex items-center justify-center gap-2 hover:bg-slate-100 transition-colors">
                        <i data-lucide="download" class="w-4 h-4"></i> QR Kodunu İndir
                    </button>
                </div>

                <div class="flex flex-col gap-3" id="modalActions">
                    <button id="modalClose" class="w-full px-4 py-4 bg-[#000080] text-white rounded-2xl text-base font-bold shadow-lg shadow-blue-900/20 active:scale-95 transition-transform">Kapat</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Uygulama İçeriği -->
    <div class="max-w-6xl mx-auto space-y-6 blur-sm pointer-events-none transition-all duration-700" id="mainContent">
        <!-- Başlık Paneli (Header) -->
        <div class="flex flex-col md:flex-row items-start gap-6 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            
            <!-- 1. LOGO (Sol Köşede) -->
            <div onclick="document.getElementById('logoInput').click()" class="w-20 h-20 shrink-0 border-2 border-dashed border-slate-300 rounded-xl flex items-center justify-center cursor-pointer hover:border-[#000080] transition-colors overflow-hidden relative group">
                <img id="logoPreview" class="hidden w-full h-full object-contain p-2">
                <div id="logoPlaceholder" class="flex flex-col items-center gap-1">
                    <i data-lucide="image" class="w-6 h-6 text-slate-300"></i>
                    <span class="text-[10px] font-bold text-slate-400">LOGO</span>
                </div>
                <input type="file" id="logoInput" class="hidden" accept="image/*">
            </div>

            <!-- 2. METİN ALANI (Orta Bölüm) -->
            <div class="flex-grow flex flex-col gap-4 w-full">
                <!-- Eldor Yazısı -->
                <h1 class="text-xl font-bold text-[#000080] mb-1 leading-none">Eldor SOP Oluşturucu</h1>
                
                <div class="flex flex-col gap-3">
                    <!-- ÜST: SOP BAŞLIĞI -->
                    <input type="text" id="sopTitleInput" class="w-full border-b-2 border-slate-100 focus:border-[#000080] focus:outline-none font-bold text-xl py-1 transition-colors" placeholder="SOP Başlığı (Örn: Paketleme Hattı)">
                    
                    <!-- ALT: PROJE ADI -->
                    <input type="text" id="sopSubtitleInput" class="w-full text-sm border-b-2 border-slate-50 focus:border-slate-300 focus:outline-none py-1 transition-colors" placeholder="Proje Adı">
                </div>
            </div>

            <!-- 3. SAĞ AKSİYON KULESİ (Dikey Blok) -->
            <div class="flex flex-col gap-3 shrink-0 ml-auto items-end">
                <!-- Üst Kat: Reset ve Çıkış -->
                <div class="flex bg-white border border-slate-200 rounded-xl overflow-hidden h-10 shadow-sm">
                    <button id="resetBtn" title="Her şeyi temizle" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:bg-red-50 hover:text-red-500 border-r border-slate-100 transition-all">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                    <button id="logoutBtn" title="Güvenli Çıkış" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:bg-orange-50 hover:text-orange-500 transition-all">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                    </button>
                </div>

                <!-- Alt Kat: PDF ve Drive Butonları (Çöp ve Çıkışın Altında) -->
                <div class="flex bg-[#000080] rounded-lg shadow-md overflow-hidden h-10">
                    <button id="exportPdfBtn" class="px-4 text-[12px] text-white font-bold hover:bg-[#000066] border-r border-[#ffffff22] transition-all flex items-center gap-2">
                        <i data-lucide="file-text" class="w-3.5 h-3.5"></i> PDF İndir
                    </button>
                    <button id="exportDriveBtn" class="px-4 text-[12px] text-white font-bold hover:bg-[#000066] flex items-center gap-2 transition-all">
                        <i data-lucide="hard-drive" class="w-3.5 h-3.5 text-green-400"></i> Drive'a Gönder
                    </button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Görsel Editör Alanı -->
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                    <div class="flex border-b border-slate-100 mb-6 gap-6">
                        <button id="tab0" class="tab-btn active px-6 py-3 text-sm font-bold transition-all">Görsel Alanı 1</button>
                        <button id="tab1" class="tab-btn px-6 py-3 text-sm font-bold transition-all">Görsel Alanı 2</button>
                    </div>
                    
                    <div id="uploadArea" onclick="document.getElementById('fileInput').click()" class="bg-slate-50 py-20 rounded-2xl border-2 border-dashed border-slate-200 text-center cursor-pointer hover:bg-slate-100 transition-all">
                        <i data-lucide="image-plus" class="w-8 h-8 text-blue-500 mx-auto mb-4"></i>
                        <p class="font-bold text-slate-600 text-lg">Görsel Yüklemek İçin Tıklayın</p>
                        <input type="file" id="fileInput" class="hidden" accept="image/*">
                    </div>

                    <div id="editorArea" class="hidden space-y-6">
                        <div class="flex items-center justify-between bg-slate-50 p-3 rounded-xl">
                            <div class="flex flex-wrap gap-2">
                                <button id="toolInstruction" class="tool-btn active px-4 py-2 text-xs font-bold rounded-lg border flex items-center gap-2">
                                    <i data-lucide="list-ordered" class="w-4 h-4 text-red-500"></i> Talimat Noktası
                                </button>
                                <button id="toolMarker" class="tool-btn px-4 py-2 text-xs font-bold rounded-lg border flex items-center gap-2">
                                    <i data-lucide="info" class="w-4 h-4 text-blue-500"></i> Bilgi Noktası
                                </button>
                            </div>
                            <button id="clearImageBtn" class="px-4 py-2 text-xs font-bold rounded-lg border border-red-100 text-red-600 hover:bg-red-50 flex items-center gap-2">
                                <i data-lucide="image-minus" class="w-4 h-4"></i> Görseli Kaldır
                            </button>
                        </div>
                        <div class="canvas-container" id="canvasContainer">
                            <canvas id="mainCanvas"></canvas>
                            <div id="markersOverlay" class="absolute inset-0 pointer-events-none"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sağ Paneller -->
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col h-[500px]">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="font-bold text-[#000080] flex items-center gap-2 text-sm uppercase tracking-wider">Talimat Adımları</h2>
                        <button id="addManualBtn" class="bg-blue-600 text-white text-[11px] px-3 py-1.5 rounded-lg flex items-center gap-2 font-bold shadow-sm">
                            <i data-lucide="plus" class="w-3.5 h-3.5"></i> Ekle
                        </button>
                    </div>
                    <div class="flex-grow overflow-auto pr-2 custom-scrollbar">
                        <table class="w-full text-sm text-left">
                            <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
                        </table>
                        <div id="emptyTableState" class="text-center py-20 text-slate-400">
                            <p class="text-xs">Henüz adım eklenmedi.</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl border border-red-50 shadow-sm">
                    <h2 class="font-bold text-red-600 flex items-center gap-2 text-sm uppercase tracking-wider mb-5">Kritik Uyarılar</h2>
                    <div id="warningsContainer" class="space-y-3"></div>
                    <button id="addWarningBtn" class="mt-5 w-full py-3 border-2 border-dashed border-red-100 text-red-400 text-xs rounded-xl hover:bg-red-50 font-bold flex items-center justify-center gap-2">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i> Yeni Kritik Uyarı
                    </button>
                </div>
            </div>
        </div>
    </div>

    <canvas id="exportCanvas" class="hidden"></canvas>

    <script>
        // --- Durum Yönetimi ---
        window.activeIdx = 0; 
        window.images = [null, null]; 
        window.companyLogo = null;
        window.points = []; 
        window.warnings = []; 
        window.currentMode = 'instruction';
        
        const ADMIN_USERNAME = "eldor";
        const ADMIN_PASSWORD = "eldor123";

        const els = {
            loginScreen: document.getElementById('loginScreen'),
            loginForm: document.getElementById('loginForm'),
            loginError: document.getElementById('loginError'),
            mainContent: document.getElementById('mainContent'),
            fileInput: document.getElementById('fileInput'),
            logoInput: document.getElementById('logoInput'),
            uploadArea: document.getElementById('uploadArea'),
            editorArea: document.getElementById('editorArea'),
            mainCanvas: document.getElementById('mainCanvas'),
            markersOverlay: document.getElementById('markersOverlay'),
            tableBody: document.getElementById('tableBody'),
            emptyTableState: document.getElementById('emptyTableState'),
            warningsContainer: document.getElementById('warningsContainer'),
            sopTitleInput: document.getElementById('sopTitleInput'),
            sopSubtitleInput: document.getElementById('sopSubtitleInput'),
            logoPreview: document.getElementById('logoPreview'),
            logoPlaceholder: document.getElementById('logoPlaceholder'),
            tabBtns: [document.getElementById('tab0'), document.getElementById('tab1')],
            toolInstruction: document.getElementById('toolInstruction'),
            toolMarker: document.getElementById('toolMarker'),
            clearImageBtn: document.getElementById('clearImageBtn'),
            exportPdfBtn: document.getElementById('exportPdfBtn'),
            exportDriveBtn: document.getElementById('exportDriveBtn'),
            resetBtn: document.getElementById('resetBtn'),
            logoutBtn: document.getElementById('logoutBtn'),
            addManualBtn: document.getElementById('addManualBtn'),
            addWarningBtn: document.getElementById('addWarningBtn'),
            loading: document.getElementById('loading'),
            loadingText: document.getElementById('loadingText'),
            customModal: document.getElementById('customModal'),
            modalTitle: document.getElementById('modalTitle'),
            modalMessage: document.getElementById('modalMessage'),
            modalActions: document.getElementById('modalActions'),
            qrSection: document.getElementById('qrSection'),
            qrContainer: document.getElementById('qrContainer'),
            qrLinkText: document.getElementById('qrLinkText'),
            downloadQrBtn: document.getElementById('downloadQrBtn')
        };

        const ctx = els.mainCanvas.getContext('2d');

        // --- Giriş Yönetimi ---
        els.loginForm.onsubmit = (e) => {
            e.preventDefault();
            const u = document.getElementById('usernameInput').value.trim();
            const p = document.getElementById('passwordInput').value.trim();
            if (u === ADMIN_USERNAME && p === ADMIN_PASSWORD) {
                els.loginScreen.classList.add('hidden');
                els.mainContent.classList.remove('blur-sm', 'pointer-events-none');
            } else {
                els.loginError.classList.remove('hidden');
                setTimeout(() => els.loginError.classList.add('hidden'), 3000);
            }
        };

        els.logoutBtn.onclick = () => {
            if(confirm("Çıkış yapmak istediğinize emin misiniz?")) location.reload();
        };

        // --- Özel Modal ---
        function showModal(title, message, isConfirm = false, onConfirm = null, qrLink = null) {
            els.modalTitle.innerText = title; 
            els.modalMessage.innerText = message;
            els.modalActions.innerHTML = '';
            els.qrSection.classList.add('hidden');
            els.qrContainer.innerHTML = '';

            if (qrLink) {
                els.qrSection.classList.remove('hidden');
                els.qrLinkText.innerText = qrLink;
                new QRCode(els.qrContainer, { text: qrLink, width: 160, height: 160, colorDark: "#000080", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H });
                
                const caption = document.createElement('p');
                caption.innerText = els.sopTitleInput.value.toUpperCase() || 'SOP DOKÜMANI';
                caption.className = "text-[9px] font-bold text-slate-700 mt-2 text-center w-[160px] truncate leading-none";
                els.qrContainer.appendChild(caption);
            }

            if (isConfirm) {
                const ok = document.createElement('button'); 
                ok.innerText = "Sıfırla"; 
                ok.className = "w-full px-4 py-4 bg-red-600 text-white rounded-2xl text-base font-bold active:scale-95 transition-transform";
                ok.onclick = () => { if(onConfirm) onConfirm(); els.customModal.style.display = 'none'; };
                const cnl = document.createElement('button'); 
                cnl.innerText = "İptal"; 
                cnl.className = "w-full px-4 py-4 bg-slate-100 rounded-2xl text-base font-bold active:scale-95 transition-transform";
                cnl.onclick = () => { els.customModal.style.display = 'none'; };
                els.modalActions.append(ok, cnl);
            } else {
                const ok = document.createElement('button'); 
                ok.innerText = "Kapat"; 
                ok.className = "w-full px-4 py-4 bg-[#000080] text-white rounded-2xl text-base font-bold active:scale-95 transition-transform";
                ok.onclick = () => { els.customModal.style.display = 'none'; };
                els.modalActions.appendChild(ok);
            }
            els.customModal.style.display = 'flex';
            if (window.lucide) lucide.createIcons();
        }

        // --- Google Drive API ---
        const GOOGLE_CLIENT_ID = '1078405925531-o68nje98l03ct1e71uvnt2pe086grdiq.apps.googleusercontent.com'; 
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';
        let tokenClient;

        async function uploadToGoogleDrive(pdfBlob) {
            if (!tokenClient) return;
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) return;
                els.loading.classList.remove('hidden');
                els.loadingText.innerText = "Drive'a aktarılıyor...";
                try {
                    const metadata = { name: `SOP_${els.sopTitleInput.value || 'Dokuman'}.pdf`, mimeType: 'application/pdf' };
                    const form = new FormData();
                    form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                    form.append('file', pdfBlob);
                    const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink', {
                        method: 'POST',
                        headers: new Headers({ 'Authorization': 'Bearer ' + resp.access_token }),
                        body: form,
                    });
                    const fileData = await response.json();
                    if (response.ok) showModal("Başarıyla Yüklendi", "Dosyanız Drive'a yüklendi ve QR kodu oluşturuldu.", false, null, fileData.webViewLink);
                } catch (e) { console.error(e); } finally { els.loading.classList.add('hidden'); }
            };
            tokenClient.requestAccessToken({ prompt: 'consent' });
        }

        // --- Editör İşlemleri ---
        els.tabBtns.forEach((btn, idx) => {
            btn.onclick = () => { 
                window.activeIdx = idx; 
                els.tabBtns.forEach((b, i) => b.classList.toggle('active', i === idx)); 
                renderAll(); 
            };
        });

        els.toolInstruction.onclick = () => { window.currentMode = 'instruction'; els.toolInstruction.classList.add('active'); els.toolMarker.classList.remove('active'); };
        els.toolMarker.onclick = () => { window.currentMode = 'marker'; els.toolMarker.classList.add('active'); els.toolInstruction.classList.remove('active'); };

        els.clearImageBtn.onclick = () => {
            if (confirm("Görseli ve işaretçileri silmek istediğinize emin misiniz?")) {
                window.images[window.activeIdx] = null;
                window.points = window.points.filter(p => p.imgIdx !== window.activeIdx);
                els.fileInput.value = "";
                renderAll();
            }
        };

        els.fileInput.onchange = (e) => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = (ev) => {
                const i = new Image(); i.onload = () => { window.images[window.activeIdx] = i; renderAll(); }; i.src = ev.target.result;
            }; r.readAsDataURL(f);
        };

        els.logoInput.onchange = (e) => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = (ev) => {
                const i = new Image(); i.onload = () => { window.companyLogo = i; els.logoPreview.src = ev.target.result; els.logoPreview.classList.remove('hidden'); els.logoPlaceholder.classList.add('hidden'); }; i.src = ev.target.result;
            }; r.readAsDataURL(f);
        };

        els.mainCanvas.onclick = (e) => {
            if (!window.images[window.activeIdx]) return;
            const rect = els.mainCanvas.getBoundingClientRect();
            const px = ((e.clientX - rect.left) / rect.width) * 100;
            const py = ((e.clientY - rect.top) / rect.height) * 100;
            window.points.push({ px, py, description: '', isSilent: window.currentMode === 'marker', imgIdx: window.activeIdx, isManual: false });
            renderAll();
        };

        els.addManualBtn.onclick = () => { window.points.push({ px: null, py: null, description: '', isSilent: false, imgIdx: -1, isManual: true }); renderAll(); };
        els.addWarningBtn.onclick = () => { window.warnings.push({ text: '' }); renderWarnings(); };

        function renderAll() {
            if (window.images[window.activeIdx]) {
                els.uploadArea.classList.add('hidden'); els.editorArea.classList.remove('hidden');
                const dw = 1200; const s = dw / window.images[window.activeIdx].width;
                els.mainCanvas.width = dw; els.mainCanvas.height = window.images[window.activeIdx].height * s;
                ctx.drawImage(window.images[window.activeIdx], 0, 0, dw, els.mainCanvas.height);
            } else {
                els.uploadArea.classList.remove('hidden'); els.editorArea.classList.add('hidden');
            }
            
            els.markersOverlay.innerHTML = ''; 
            els.tableBody.innerHTML = '';
            
            let ic = 0; let mc = 0;
            const instructions = window.points.filter(p => !p.isSilent);
            els.emptyTableState.classList.toggle('hidden', instructions.length > 0);

            window.points.forEach((p, idx) => {
                if (!p.isSilent) ic++; else mc++;
                if (p.imgIdx === window.activeIdx && !p.isManual) {
                    const m = document.createElement('div'); 
                    m.className = p.isSilent ? 'blue-marker' : 'marker';
                    m.innerText = p.isSilent ? mc : ic; m.style.left = p.px + '%'; m.style.top = p.py + '%';
                    m.onclick = (ev) => { ev.stopPropagation(); window.points.splice(idx, 1); renderAll(); };
                    els.markersOverlay.appendChild(m);
                }
                if (!p.isSilent) {
                    const tr = document.createElement('tr');
                    tr.className = "group hover:bg-slate-50 transition-colors";
                    tr.innerHTML = `<td class="py-3 px-2 align-top"><span class="w-6 h-6 rounded-full flex items-center justify-center font-bold text-white text-[10px] ${p.isManual ? 'bg-blue-500' : 'bg-red-500'}">${ic}</span></td>
                        <td class="py-2 px-2"><textarea class="w-full bg-transparent border-0 focus:ring-0 text-slate-700 text-xs resize-none leading-relaxed outline-none" rows="2" oninput="window.points[${idx}].description=this.value">${p.description || ''}</textarea></td>
                        <td class="py-2 px-2 text-right"><button onclick="window.points.splice(${idx}, 1); renderAll();" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="x" class="w-4 h-4"></i></button></td>`;
                    els.tableBody.appendChild(tr);
                }
            });
            if (window.lucide) lucide.createIcons();
        }

        function renderWarnings() {
            els.warningsContainer.innerHTML = '';
            window.warnings.forEach((w, i) => {
                const d = document.createElement('div'); d.className = 'flex gap-2 items-center bg-red-50 p-2 rounded-lg border border-red-100';
                d.innerHTML = `<input type="text" class="flex-grow bg-transparent text-xs text-red-900 outline-none" value="${w.text || ''}" oninput="window.warnings[${i}].text=this.value">
                    <button onclick="window.warnings.splice(${i}, 1); renderWarnings();" class="text-red-400"><i data-lucide="x" class="w-4 h-4"></i></button>`;
                els.warningsContainer.appendChild(d);
            });
            if (window.lucide) lucide.createIcons();
        }

        async function createPdfBlob() {
            const canv = document.getElementById('exportCanvas');
            const ex = canv.getContext('2d');
            const width = 1240; 
            let totalH = 400;
            window.images.forEach(img => { if(img) totalH += (img.height * (1120/img.width)) + 100; });
            totalH += window.points.filter(p => !p.isSilent).length * 100 + 400;
            canv.width = width; canv.height = Math.max(totalH, 1200);
            ex.fillStyle = 'white'; ex.fillRect(0, 0, width, canv.height);
            
            if (window.companyLogo) {
                const s = Math.min(120/window.companyLogo.width, 120/window.companyLogo.height);
                ex.drawImage(window.companyLogo, 60, 50, window.companyLogo.width*s, window.companyLogo.height*s);
            }
            ex.fillStyle = '#000080'; ex.font = 'bold 44px Arial'; ex.fillText(els.sopTitleInput.value.toUpperCase() || 'SOP DOKÜMANI', 200, 95);
            ex.fillStyle = '#64748b'; ex.font = '24px Arial'; ex.fillText(els.sopSubtitleInput.value || '', 200, 140);
            
            let curY = 280;
            window.images.forEach((img, idx) => {
                if(!img) return;
                const dw = 1120; const scale = dw/img.width; const dh = img.height*scale;
                ex.drawImage(img, 60, curY, dw, dh);
                let is = 0; let ms = 0;
                window.points.forEach(p => {
                    if(!p.isSilent) is++; else ms++;
                    if(p.imgIdx === idx && !p.isManual) {
                        const mx = 60 + (p.px/100)*dw; const my = curY + (p.py/100)*dh;
                        ex.beginPath(); ex.arc(mx, my, 22, 0, 7);
                        ex.fillStyle = p.isSilent ? '#3b82f6' : '#ef4444'; ex.fill();
                        ex.strokeStyle = 'white'; ex.lineWidth = 4; ex.stroke();
                        ex.fillStyle = 'white'; ex.font = 'bold 22px Arial'; ex.textAlign = 'center'; ex.textBaseline = 'middle';
                        ex.fillText(p.isSilent ? ms : is, mx, my);
                    }
                });
                curY += dh + 80;
            });

            ex.textAlign = 'left'; ex.textBaseline = 'alphabetic';
            ex.fillStyle = '#000080'; ex.font = 'bold 32px Arial'; ex.fillText('UYGULAMA TALİMATLARI', 60, curY); curY += 70;
            
            let n = 0;
            window.points.forEach(p => {
                if(p.isSilent) return; n++;
                ex.fillStyle = p.isManual ? '#3b82f6' : '#ef4444'; 
                ex.beginPath(); ex.arc(85, curY-12, 20, 0, 7); ex.fill();
                ex.fillStyle = 'white'; ex.font = 'bold 22px Arial'; ex.textAlign = 'center'; ex.fillText(n, 85, curY-4);
                ex.textAlign = 'left'; ex.fillStyle = '#1e293b'; ex.font = '24px Arial';
                const words = (p.description || 'Açıklama girilmedi.').split(' '); 
                let line = ''; let ty = curY;
                words.forEach(w => {
                    let test = line + w + ' '; 
                    if(ex.measureText(test).width > 920) { ex.fillText(line, 140, ty); line = w + ' '; ty += 40; } else { line = test; }
                });
                ex.fillText(line, 140, ty); curY = ty + 80;
            });

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', [210, (canv.height*210)/canv.width]);
            pdf.addImage(canv.toDataURL('image/jpeg', 0.92), 'JPEG', 0, 0, 210, (canv.height*210)/canv.width);
            return pdf.output('blob');
        }

        els.exportPdfBtn.onclick = async () => {
            els.loading.classList.remove('hidden');
            try {
                const blob = await createPdfBlob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `SOP_${els.sopTitleInput.value || 'Dokuman'}.pdf`; a.click();
            } catch (e) { console.error(e); }
            els.loading.classList.add('hidden');
        };

        els.exportDriveBtn.onclick = async () => {
            try {
                const blob = await createPdfBlob();
                uploadToGoogleDrive(blob);
            } catch (e) { console.error(e); }
        };

        els.resetBtn.onclick = () => { 
            showModal("Sıfırla", "Tüm veriler temizlenecektir. Emin misiniz?", true, () => { 
                window.points=[]; window.warnings=[]; window.images=[null,null]; 
                els.sopTitleInput.value = ''; els.sopSubtitleInput.value = '';
                els.logoPreview.classList.add('hidden'); els.logoPlaceholder.classList.remove('hidden');
                window.companyLogo = null; renderAll(); renderWarnings(); 
            }); 
        };

        els.downloadQrBtn.onclick = () => {
            const qrc = els.qrContainer.querySelector('canvas');
            if (qrc) {
                const a = document.createElement('a');
                a.href = qrc.toDataURL("image/png");
                a.download = "QR_Kod.png";
                a.click();
            }
        };

        window.onload = () => {
            if (window.lucide) lucide.createIcons();
            gapi.load('client', () => {
                gapi.client.init({ discoveryDocs: [DISCOVERY_DOC] });
            });
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID,
                scope: SCOPES,
                callback: '',
            });
        };
    </script>
</body>
</html>

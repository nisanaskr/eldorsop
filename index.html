<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eldor SOP Creator - QR & Drive Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    
    <!-- Cropper.js for image cropping -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .canvas-container { position: relative; display: inline-block; cursor: crosshair; width: 100%; background: #eee; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
        canvas { display: block; max-width: 100%; height: auto; }
        
        .marker { position: absolute; width: 28px; height: 28px; background: rgba(239, 68, 68, 0.95); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; transform: translate(-50%, -50%); border: 2px solid white; pointer-events: auto; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); z-index: 10; }
        .info-marker { position: absolute; width: 18px; height: 18px; border-radius: 50%; transform: translate(-50%, -50%); border: 2px solid white; pointer-events: auto; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); z-index: 9; }
        .illustration-marker { position: absolute; transform: translate(-50%, -50%); background: white; border: 2px solid #000080; padding: 4px 8px; border-radius: 8px; font-size: 10px; font-weight: 800; color: #000080; display: flex; flex-direction: column; align-items: center; gap: 2px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; pointer-events: auto; z-index: 25; }

        .tool-btn.active { background-color: #000080; color: white; border-color: #000080; }
        .tab-btn.active { border-bottom: 3px solid #000080; color: #000080; font-weight: 700; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        #loginScreen { background: linear-gradient(135deg, #000080 0%, #000044 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .color-dot { width: 16px; height: 16px; border-radius: 50%; cursor: pointer; border: 1px solid #ddd; }
        .color-dot.active { outline: 2px solid #000080; outline-offset: 2px; }

        #cropModal { z-index: 9500; }
        .cropper-container-wrapper { width: 100%; max-height: 60vh; background: #333; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 12px; }
        #cropImageElement { max-width: 100%; display: block; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Login Screen -->
    <div id="loginScreen" class="fixed inset-0 z-[8000] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl p-10 shadow-2xl space-y-8">
            <div class="text-center space-y-3">
                <div class="w-20 h-20 bg-blue-50 rounded-2xl mx-auto flex items-center justify-center mb-4">
                    <i data-lucide="lock" class="w-10 h-10 text-[#000080]"></i>
                </div>
                <h2 class="text-3xl font-bold text-slate-900">Eldor SOP Panel</h2>
                <p class="text-slate-500">Sign in with your administrator credentials.</p>
            </div>
            <form id="loginForm" class="space-y-5">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Username</label>
                    <input type="text" id="usernameInput" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Password</label>
                    <input type="password" id="passwordInput" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                </div>
                <div id="loginError" class="hidden text-red-500 text-sm font-medium text-center bg-red-50 py-2 rounded-lg">Invalid username or password!</div>
                <button type="submit" class="w-full py-4 bg-[#000080] text-white rounded-xl font-bold shadow-xl">Login</button>
            </form>
        </div>
    </div>

    <!-- Loading Indicator -->
    <div id="loading" class="loading-overlay hidden">
        <div class="w-14 h-14 border-4 border-[#000080] border-t-transparent rounded-full animate-spin mb-4"></div>
        <p id="loadingText" class="font-bold text-[#000080] text-lg text-center px-4">Processing...</p>
    </div>

    <!-- Crop Modal -->
    <div id="cropModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl max-w-4xl w-full p-8 shadow-2xl">
            <h3 class="text-2xl font-bold mb-4 text-slate-900">Crop Image</h3>
            <div class="cropper-container-wrapper mb-6">
                <img id="cropImageElement" src="">
            </div>
            <div class="flex justify-end gap-3">
                <button id="cancelCropBtn" class="px-6 py-3 bg-slate-200 text-slate-700 rounded-xl font-bold">Cancel</button>
                <button id="confirmCropBtn" class="px-8 py-3 bg-[#000080] text-white rounded-xl font-bold flex items-center gap-2">
                    <i data-lucide="scissors" class="w-4 h-4"></i> Apply Crop
                </button>
            </div>
        </div>
    </div>

    <!-- Modal UI -->
    <div id="customModal" class="fixed inset-0 bg-black/60 z-[9000] hidden items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white rounded-3xl max-w-md w-full p-8 shadow-2xl text-center">
            <h3 id="modalTitle" class="text-2xl font-bold mb-3">Information</h3>
            <p id="modalMessage" class="text-slate-500 mb-8"></p>
            <div id="qrSection" class="hidden mb-8 p-6 bg-slate-50 rounded-2xl border border-slate-100">
                <div id="qrContainer" class="flex justify-center mb-1"></div>
                <p id="qrTitleText" class="font-bold text-[#000080] text-xs w-[160px] mx-auto text-center mb-4 uppercase tracking-tighter"></p>
                <p id="qrLinkText" class="text-[10px] text-slate-400 mb-4 break-all bg-white p-2 rounded border"></p>
                <button id="downloadQrBtn" class="w-full py-3 bg-white border border-slate-200 rounded-xl text-sm font-bold flex items-center justify-center gap-2">
                    <i data-lucide="download" class="w-4 h-4"></i> Download QR Code
                </button>
            </div>
            <button id="modalClose" class="w-full px-4 py-4 bg-[#000080] text-white rounded-2xl font-bold">Close</button>
        </div>
    </div>

    <!-- App Content -->
    <div class="max-w-6xl mx-auto space-y-6 blur-sm pointer-events-none transition-all duration-700" id="mainContent">
        <!-- Top Panel -->
        <div class="flex flex-col md:flex-row items-center gap-6 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div onclick="document.getElementById('logoInput').click()" class="w-24 h-24 shrink-0 border-2 border-dashed border-slate-300 rounded-xl flex items-center justify-center cursor-pointer overflow-hidden relative group bg-slate-50">
                <img id="logoPreview" class="hidden w-full h-full object-contain p-2">
                <div id="logoPlaceholder" class="flex flex-col items-center gap-1">
                    <i data-lucide="image" class="w-6 h-6 text-slate-300"></i>
                    <span class="text-[10px] font-bold text-slate-400 uppercase">Logo</span>
                </div>
                <input type="file" id="logoInput" class="hidden" accept="image/*">
            </div>

            <div class="flex-grow flex flex-col gap-4 w-full">
                <input type="text" id="sopTitleInput" class="w-full border-b-2 border-slate-100 focus:border-[#000080] focus:outline-none font-bold text-2xl py-1 text-[#000080]" placeholder="SOP TITLE">
                <input type="text" id="sopSubtitleInput" class="w-full text-base border-b-2 border-slate-300 focus:border-slate-500 focus:outline-none py-1 text-slate-500 font-medium" placeholder="PROJECT / MODEL">
            </div>

            <div class="flex flex-col gap-3 shrink-0 ml-auto items-end">
                <div class="flex bg-[#000080] rounded-lg shadow-md overflow-hidden h-12">
                    <button id="exportPdfBtn" class="px-6 text-[13px] text-white font-bold hover:bg-[#000066] border-r border-[#ffffff22] flex items-center gap-2">
                        <i data-lucide="file-text" class="w-4 h-4"></i> Export PDF
                    </button>
                    <button id="exportDriveBtn" class="px-6 text-[13px] text-white font-bold hover:bg-[#000066] flex items-center gap-2">
                        <i data-lucide="hard-drive" class="w-4 h-4 text-green-400"></i> Send to Drive
                    </button>
                </div>
                <button id="resetBtn" class="text-xs text-red-500 font-bold hover:underline px-2">Reset Data</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left: Editor Area -->
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                    <div class="flex border-b border-slate-100 mb-6 gap-6">
                        <button id="tab0" class="tab-btn active px-6 py-3 text-sm font-bold">Image Area 1</button>
                        <button id="tab1" class="tab-btn px-6 py-3 text-sm font-bold">Image Area 2</button>
                    </div>
                    
                    <div id="uploadArea" onclick="document.getElementById('fileInput').click()" class="bg-slate-50 py-24 rounded-2xl border-2 border-dashed border-slate-200 text-center cursor-pointer">
                        <i data-lucide="image-plus" class="w-10 h-10 text-blue-500 mx-auto mb-4"></i>
                        <p class="font-bold text-slate-600">Click to Upload Image</p>
                        <input type="file" id="fileInput" class="hidden" accept="image/*">
                    </div>

                    <div id="editorArea" class="hidden space-y-6">
                        <div class="flex flex-wrap items-center justify-between bg-slate-100 p-3 rounded-xl border border-slate-200 gap-4">
                            <div class="flex flex-wrap gap-2">
                                <button id="toolInstruction" class="tool-btn active px-4 py-2 text-xs font-bold rounded-lg border flex items-center gap-2">
                                    <div class="w-3 h-3 rounded-full bg-red-500"></div> Instruction (Red)
                                </button>
                                
                                <div class="flex items-center gap-2 bg-white px-2 py-1 rounded-lg border border-slate-200">
                                    <button id="toolMarker" class="tool-btn px-3 py-1.5 text-xs font-bold rounded-lg border flex items-center gap-2">
                                        <i data-lucide="map-pin" class="w-3 h-3"></i> Marker
                                    </button>
                                    <div class="flex gap-1">
                                        <div onclick="setInfoColor('#3b82f6')" id="c-blue" class="color-dot bg-blue-500 active"></div>
                                        <div onclick="setInfoColor('#22c55e')" id="c-green" class="color-dot bg-green-500"></div>
                                        <div onclick="setInfoColor('#eab308')" id="c-yellow" class="color-dot bg-yellow-500"></div>
                                        <div onclick="setInfoColor('#8b5cf6')" id="c-purple" class="color-dot bg-purple-500"></div>
                                    </div>
                                </div>

                                <button id="toolArrow" class="tool-btn px-4 py-2 text-xs font-bold rounded-lg border flex items-center gap-2">
                                    <i data-lucide="move-up-right" class="w-3 h-3"></i> Draw Arrow
                                </button>
                                <button id="toolIllust" class="tool-btn px-4 py-2 text-xs font-bold rounded-lg border flex items-center gap-2">
                                    <i data-lucide="user" class="w-3 h-3"></i> Operator Side
                                </button>
                                <button id="undoBtn" class="px-4 py-2 text-xs font-bold rounded-lg border border-slate-300 hover:bg-slate-200 flex items-center gap-2 transition-colors">
                                    <i data-lucide="undo-2" class="w-3 h-3"></i> Undo
                                </button>
                            </div>
                            <div class="flex gap-2">
                                <button id="cropCurrentBtn" class="px-4 py-2 text-xs font-bold rounded-lg text-blue-600 hover:bg-blue-50 flex items-center gap-2 transition-all">
                                    <i data-lucide="crop" class="w-4 h-4"></i> Crop
                                </button>
                                <button onclick="clearCurrentImage()" class="px-4 py-2 text-xs font-bold text-red-600 hover:bg-red-50 flex items-center gap-2 transition-all">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i> Remove
                                </button>
                            </div>
                        </div>
                        <div class="canvas-container" id="canvasContainer">
                            <canvas id="mainCanvas"></canvas>
                            <div id="markersOverlay" class="absolute inset-0 pointer-events-none"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Information Input -->
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col h-[280px]">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="font-bold text-[#000080] text-sm uppercase">INSTRUCTION STEPS</h2>
                        <button id="addManualBtn" class="bg-blue-600 text-white text-[10px] px-3 py-1.5 rounded-lg font-bold shadow-sm">+ Add Step</button>
                    </div>
                    <div class="flex-grow overflow-auto pr-2 custom-scrollbar">
                        <table class="w-full text-sm text-left">
                            <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
                        </table>
                        <div id="emptyTableState" class="text-center py-10 text-slate-400">
                            <p class="text-xs">No steps added yet.</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl border border-red-50 shadow-sm">
                    <h2 class="font-bold text-red-600 text-sm uppercase mb-5 flex items-center gap-2">
                        <i data-lucide="alert-triangle" class="w-4 h-4"></i> CRITICAL WARNINGS
                    </h2>
                    <div id="warningsContainer" class="space-y-3"></div>
                    <button id="addWarningBtn" class="mt-5 w-full py-3 border-2 border-dashed border-red-100 text-red-400 text-xs rounded-xl font-bold">+ Add New Warning</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CRITICAL: Replace with your actual Google Client ID
        const GOOGLE_CLIENT_ID = '1078405925531-o68nje98l03ct1e71uvnt2pe086grdiq.apps.googleusercontent.com'; 
        
        // State
        let activeIdx = 0; 
        let images = [null, null]; 
        let rawImages = [null, null]; 
        let companyLogo = null;
        let points = []; 
        let arrows = [];
        let illustrations = [];
        let warnings = []; 
        let actionHistory = [];
        let currentMode = 'instruction';
        let infoColor = '#3b82f6';
        let arrowStart = null;
        let cropper = null;

        const ADMIN_U = "eldor", ADMIN_P = "eldor123";

        const els = {
            loginScreen: document.getElementById('loginScreen'),
            loginForm: document.getElementById('loginForm'),
            mainContent: document.getElementById('mainContent'),
            fileInput: document.getElementById('fileInput'),
            logoInput: document.getElementById('logoInput'),
            uploadArea: document.getElementById('uploadArea'),
            editorArea: document.getElementById('editorArea'),
            mainCanvas: document.getElementById('mainCanvas'),
            markersOverlay: document.getElementById('markersOverlay'),
            tableBody: document.getElementById('tableBody'),
            emptyTableState: document.getElementById('emptyTableState'),
            warningsContainer: document.getElementById('warningsContainer'),
            sopTitleInput: document.getElementById('sopTitleInput'),
            sopSubtitleInput: document.getElementById('sopSubtitleInput'),
            logoPreview: document.getElementById('logoPreview'),
            loading: document.getElementById('loading'),
            loadingText: document.getElementById('loadingText'),
            customModal: document.getElementById('customModal'),
            modalTitle: document.getElementById('modalTitle'),
            modalMessage: document.getElementById('modalMessage'),
            qrSection: document.getElementById('qrSection'),
            qrContainer: document.getElementById('qrContainer'),
            qrLinkText: document.getElementById('qrLinkText'),
            qrTitleText: document.getElementById('qrTitleText'),
            exportPdfBtn: document.getElementById('exportPdfBtn'),
            exportDriveBtn: document.getElementById('exportDriveBtn'),
            downloadQrBtn: document.getElementById('downloadQrBtn'),
            resetBtn: document.getElementById('resetBtn'),
            addManualBtn: document.getElementById('addManualBtn'),
            addWarningBtn: document.getElementById('addWarningBtn'),
            toolInstruction: document.getElementById('toolInstruction'),
            toolMarker: document.getElementById('toolMarker'),
            toolArrow: document.getElementById('toolArrow'),
            toolIllust: document.getElementById('toolIllust'),
            undoBtn: document.getElementById('undoBtn'),
            modalClose: document.getElementById('modalClose'),
            tab0: document.getElementById('tab0'),
            tab1: document.getElementById('tab1'),
            cropModal: document.getElementById('cropModal'),
            cropImageElement: document.getElementById('cropImageElement'),
            confirmCropBtn: document.getElementById('confirmCropBtn'),
            cancelCropBtn: document.getElementById('cancelCropBtn'),
            cropCurrentBtn: document.getElementById('cropCurrentBtn')
        };

        const ctx = els.mainCanvas.getContext('2d');

        // Login Logic
        els.loginForm.onsubmit = (e) => {
            e.preventDefault();
            if (document.getElementById('usernameInput').value === ADMIN_U && document.getElementById('passwordInput').value === ADMIN_P) {
                els.loginScreen.classList.add('hidden');
                els.mainContent.classList.remove('blur-sm', 'pointer-events-none');
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        };

        // Cropping
        function openCropper(source) {
            els.cropImageElement.src = source;
            els.cropModal.classList.remove('hidden');
            els.cropModal.classList.add('flex');
            
            if (cropper) cropper.destroy();
            
            cropper = new Cropper(els.cropImageElement, {
                viewMode: 1,
                autoCropArea: 1,
                responsive: true,
                restore: false
            });
        }

        els.confirmCropBtn.onclick = () => {
            const croppedCanvas = cropper.getCroppedCanvas({ maxWidth: 2000, maxHeight: 2000 });
            const img = new Image();
            img.onload = () => {
                images[activeIdx] = img;
                renderAll();
                els.cropModal.classList.add('hidden');
                els.cropModal.classList.remove('flex');
                cropper.destroy();
            };
            img.src = croppedCanvas.toDataURL();
        };

        els.cancelCropBtn.onclick = () => {
            els.cropModal.classList.add('hidden');
            els.cropModal.classList.remove('flex');
            if (cropper) cropper.destroy();
        };

        els.cropCurrentBtn.onclick = () => {
            if (rawImages[activeIdx]) openCropper(rawImages[activeIdx]);
        };

        // Tool Modes
        function setInfoColor(c) {
            infoColor = c;
            setMode('marker');
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            const idMap = {'#3b82f6': 'blue', '#22c55e': 'green', '#eab308': 'yellow', '#8b5cf6': 'purple'};
            const colorDot = document.getElementById('c-' + idMap[c]);
            if (colorDot) colorDot.classList.add('active');
        }

        function setMode(m) {
            currentMode = m;
            arrowStart = null;
            els.toolInstruction.classList.toggle('active', m === 'instruction');
            els.toolMarker.classList.toggle('active', m === 'marker');
            els.toolArrow.classList.toggle('active', m === 'arrow');
            els.toolIllust.classList.toggle('active', m === 'illustration');
        }

        els.toolInstruction.onclick = () => setMode('instruction');
        els.toolMarker.onclick = () => setMode('marker');
        els.toolArrow.onclick = () => setMode('arrow');
        els.toolIllust.onclick = () => setMode('illustration');

        els.undoBtn.onclick = () => {
            if (actionHistory.length === 0) return;
            const lastAction = actionHistory.pop();
            if (lastAction.type === 'point') {
                const idx = points.indexOf(lastAction.ref);
                if (idx > -1) points.splice(idx, 1);
            } else if (lastAction.type === 'arrow') {
                const idx = arrows.indexOf(lastAction.ref);
                if (idx > -1) arrows.splice(idx, 1);
            } else if (lastAction.type === 'illustration') {
                const idx = illustrations.indexOf(lastAction.ref);
                if (idx > -1) illustrations.splice(idx, 1);
            }
            renderAll();
        };

        // Image Selection
        els.logoInput.onchange = (e) => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = (ev) => {
                const i = new Image(); i.onload = () => {
                    companyLogo = i; els.logoPreview.src = ev.target.result;
                    els.logoPreview.classList.remove('hidden'); 
                    document.getElementById('logoPlaceholder').classList.add('hidden');
                }; i.src = ev.target.result;
            }; r.readAsDataURL(f);
        };

        els.fileInput.onchange = (e) => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = (ev) => {
                rawImages[activeIdx] = ev.target.result;
                openCropper(ev.target.result);
            }; r.readAsDataURL(f);
        };

        function clearCurrentImage() {
            images[activeIdx] = null;
            rawImages[activeIdx] = null;
            points = points.filter(p => p.imgIdx !== activeIdx);
            arrows = arrows.filter(a => a.imgIdx !== activeIdx);
            illustrations = illustrations.filter(ilst => ilst.imgIdx !== activeIdx);
            actionHistory = actionHistory.filter(h => h.ref.imgIdx !== activeIdx);
            renderAll();
        }

        // Canvas Interactions
        els.mainCanvas.onclick = (e) => {
            if (!images[activeIdx]) return;
            const rect = els.mainCanvas.getBoundingClientRect();
            const px = ((e.clientX - rect.left) / rect.width) * 100;
            const py = ((e.clientY - rect.top) / rect.height) * 100;

            if (currentMode === 'instruction') {
                const newPoint = { px, py, description: '', isSilent: false, color: '#ef4444', imgIdx: activeIdx };
                points.push(newPoint);
                actionHistory.push({ type: 'point', ref: newPoint });
            } else if (currentMode === 'marker') {
                const newPoint = { px, py, description: '', isSilent: true, color: infoColor, imgIdx: activeIdx };
                points.push(newPoint);
                actionHistory.push({ type: 'point', ref: newPoint });
            } else if (currentMode === 'illustration') {
                const newIllust = { px, py, imgIdx: activeIdx };
                illustrations.push(newIllust);
                actionHistory.push({ type: 'illustration', ref: newIllust });
            } else if (currentMode === 'arrow') {
                if (!arrowStart) {
                    arrowStart = { px, py };
                } else {
                    const newArrow = { x1: arrowStart.px, y1: arrowStart.py, x2: px, y2: py, imgIdx: activeIdx };
                    arrows.push(newArrow);
                    actionHistory.push({ type: 'arrow', ref: newArrow });
                    arrowStart = null;
                }
            }
            renderAll();
        };

        function renderAll() {
            const img = images[activeIdx];
            if (img) {
                els.uploadArea.classList.add('hidden'); 
                els.editorArea.classList.remove('hidden');
                els.mainCanvas.width = 1200; 
                els.mainCanvas.height = img.height * (1200 / img.width);
                ctx.drawImage(img, 0, 0, 1200, els.mainCanvas.height);
                arrows.forEach(a => {
                    if (a.imgIdx === activeIdx) {
                        drawArrow(ctx, (a.x1/100)*1200, (a.y1/100)*els.mainCanvas.height, (a.x2/100)*1200, (a.y2/100)*els.mainCanvas.height);
                    }
                });
            } else {
                els.uploadArea.classList.remove('hidden'); 
                els.editorArea.classList.add('hidden');
            }
            
            els.markersOverlay.innerHTML = ''; 
            els.tableBody.innerHTML = '';
            let instructionCounter = 0;
            
            points.forEach((p, idx) => {
                if (!p.isSilent) instructionCounter++;
                if (p.imgIdx === activeIdx) {
                    const m = document.createElement('div'); 
                    if (!p.isSilent) { 
                        m.className = 'marker'; 
                        m.innerText = instructionCounter; 
                    } else { 
                        m.className = 'info-marker'; 
                        m.style.backgroundColor = p.color; 
                    }
                    m.style.left = p.px + '%'; m.style.top = p.py + '%';
                    m.onclick = (ev) => { 
                        ev.stopPropagation(); 
                        points.splice(idx, 1); 
                        actionHistory = actionHistory.filter(h => h.ref !== p);
                        renderAll(); 
                    };
                    els.markersOverlay.appendChild(m);
                }
                
                if (!p.isSilent) {
                    const tr = document.createElement('tr'); tr.className = "group hover:bg-slate-50";
                    tr.innerHTML = `
                        <td class="py-3 px-2 align-top"><span class="w-6 h-6 rounded-full flex items-center justify-center font-bold text-white text-[11px] bg-red-500">${instructionCounter}</span></td>
                        <td class="py-2 px-2"><textarea class="w-full bg-transparent border-0 focus:ring-0 text-slate-700 text-xs resize-none outline-none font-medium" rows="2" placeholder="Step description..." oninput="points[${idx}].description=this.value">${p.description}</textarea></td>
                        <td class="py-2 px-2 text-right"><button onclick="points.splice(${idx}, 1); renderAll();" class="text-slate-300 hover:text-red-500"><i data-lucide="x" class="w-4 h-4"></i></button></td>`;
                    els.tableBody.appendChild(tr);
                }
            });

            illustrations.forEach((ilst, idx) => {
                if (ilst.imgIdx === activeIdx) {
                    const div = document.createElement('div');
                    div.className = 'illustration-marker';
                    div.style.left = ilst.px + '%'; div.style.top = ilst.py + '%';
                    div.innerHTML = `<i data-lucide="user" class="w-4 h-4"></i><span style="font-size:8px">OPERATOR SIDE</span>`;
                    div.onclick = (ev) => { 
                        ev.stopPropagation(); 
                        illustrations.splice(idx, 1); 
                        actionHistory = actionHistory.filter(h => h.ref !== ilst);
                        renderAll(); 
                    };
                    els.markersOverlay.appendChild(div);
                }
            });
            els.emptyTableState.classList.toggle('hidden', instructionCounter > 0);
            lucide.createIcons();
            renderWarnings();
        }

        function drawArrow(context, fromx, fromy, tox, toy) {
            const headlen = 20;
            const angle = Math.atan2(toy - fromy, tox - fromx);
            context.strokeStyle = "#000080";
            context.lineWidth = 6;
            context.beginPath();
            context.moveTo(fromx, fromy);
            context.lineTo(tox, toy);
            context.lineTo(tox - headlen * Math.cos(angle - Math.PI / 6), toy - headlen * Math.sin(angle - Math.PI / 6));
            context.moveTo(tox, toy);
            context.lineTo(tox - headlen * Math.cos(angle + Math.PI / 6), toy - headlen * Math.sin(angle + Math.PI / 6));
            context.stroke();
        }

        function renderWarnings() {
            els.warningsContainer.innerHTML = '';
            warnings.forEach((w, i) => {
                const d = document.createElement('div'); d.className = "flex gap-2 bg-red-50 p-2 rounded border border-red-100 items-start";
                d.innerHTML = `
                    <i data-lucide="alert-circle" class="w-3.5 h-3.5 text-red-500 shrink-0 mt-1"></i>
                    <textarea class="flex-grow bg-transparent text-xs outline-none text-red-700 resize-none overflow-hidden" 
                        placeholder="Enter critical warning here..." 
                        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';warnings[${i}].text=this.value">${w.text}</textarea>
                    <button onclick="warnings.splice(${i}, 1); renderWarnings();" class="text-red-300 hover:text-red-500">&times;</button>`;
                els.warningsContainer.appendChild(d);
                const ta = d.querySelector('textarea');
                ta.style.height = ta.scrollHeight + 'px';
            });
            lucide.createIcons();
        }

        // PDF Generation
        async function createPdfBlob() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const expCanvas = document.createElement('canvas');
            const ex = expCanvas.getContext('2d');
            expCanvas.width = 2480; expCanvas.height = 3508; 
            ex.fillStyle = 'white'; ex.fillRect(0, 0, 2480, 3508);
            let y = 100;
            if (companyLogo) { 
                const r = companyLogo.width / companyLogo.height; 
                ex.drawImage(companyLogo, 100, y, 150*r, 150); 
            }
            ex.fillStyle = '#000080'; ex.font = 'bold 80px Arial'; 
            ex.fillText(els.sopTitleInput.value.toUpperCase() || 'SOP DOCUMENT', 450, y + 100);
            y += 250;
            
            for (let i=0; i<2; i++) {
                const img = images[i];
                if (img) {
                    const dw = 1800; const dh = (img.height * dw) / img.width; const dx = (2480 - dw) / 2;
                    ex.drawImage(img, dx, y, dw, dh);
                    arrows.forEach(a => { if(a.imgIdx === i) drawArrow(ex, dx+(a.x1/100)*dw, y+(a.y1/100)*dh, dx+(a.x2/100)*dw, y+(a.y2/100)*dh); });
                    
                    let pdfStepCount = 0;
                    points.forEach(p => {
                        if (p.isSilent === false) pdfStepCount++;
                        if (p.imgIdx === i) {
                            const mx = dx + (p.px/100)*dw; const my = y + (p.py/100)*dh;
                            ex.beginPath(); ex.arc(mx, my, p.isSilent ? 20 : 30, 0, Math.PI*2);
                            ex.fillStyle = p.color; ex.fill(); ex.strokeStyle = 'white'; ex.lineWidth = 6; ex.stroke();
                            if (!p.isSilent) { ex.fillStyle = 'white'; ex.font = 'bold 36px Arial'; ex.textAlign = 'center'; ex.fillText(pdfStepCount, mx, my + 13); }
                        }
                    });
                    
                    illustrations.forEach(ilst => {
                        if (ilst.imgIdx === i) {
                            const ix = dx + (ilst.px/100)*dw; const iy = y + (ilst.py/100)*dh;
                            ex.fillStyle = 'white'; ex.strokeStyle = '#000080'; ex.lineWidth = 4;
                            ex.fillRect(ix-80, iy-40, 160, 80); ex.strokeRect(ix-80, iy-40, 160, 80);
                            ex.fillStyle = '#000080'; ex.font = 'bold 24px Arial'; ex.textAlign = 'center'; ex.fillText('OPERATOR SIDE', ix, iy+10);
                        }
                    });
                    y += dh + 100;
                }
            }
            
            ex.fillStyle = '#f1f5f9'; ex.fillRect(100, y, 2280, 80);
            ex.fillStyle = '#000080'; ex.font = 'bold 50px Arial'; ex.textAlign = 'left'; 
            ex.fillText('INSTRUCTION STEPS', 140, y + 55);
            y += 120;
            
            let sNum = 1;
            points.forEach(p => {
                if(!p.isSilent) {
                    ex.beginPath(); ex.arc(140, y+15, 30, 0, Math.PI*2); ex.fillStyle = '#000080'; ex.fill();
                    ex.fillStyle = 'white'; ex.font = 'bold 30px Arial'; ex.textAlign = 'center'; ex.fillText(sNum++, 140, y + 25);
                    ex.fillStyle = '#334155'; ex.font = '35px Arial'; ex.textAlign = 'left'; ex.fillText(p.description || "---", 200, y + 25);
                    y += 70;
                }
            });
            doc.addImage(expCanvas.toDataURL('image/jpeg', 0.85), 'JPEG', 0, 0, 210, 297);
            return doc.output('blob');
        }

        els.exportPdfBtn.onclick = async () => {
            els.loadingText.innerText = "Generating PDF...";
            els.loading.classList.remove('hidden');
            try {
                const blob = await createPdfBlob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; 
                a.download = `SOP_${els.sopTitleInput.value || 'Doc'}.pdf`; 
                a.click();
            } finally {
                els.loading.classList.add('hidden');
            }
        };

        els.exportDriveBtn.onclick = async () => {
            const blob = await createPdfBlob();
            uploadToDrive(blob);
        };

        // QR Code Handler
        els.downloadQrBtn.onclick = () => {
            const qrSource = els.qrContainer.querySelector('canvas');
            if (!qrSource) return;
            const dlCanvas = document.createElement('canvas');
            const dctx = dlCanvas.getContext('2d');
            const qrWidth = 160;
            const padding = 20; 
            const textPaddingTop = 10;
            const fontSize = 14;
            dlCanvas.width = qrWidth + (padding * 2);
            dlCanvas.height = qrWidth + (padding * 2) + fontSize + textPaddingTop;
            dctx.fillStyle = 'white'; dctx.fillRect(0, 0, dlCanvas.width, dlCanvas.height);
            dctx.drawImage(qrSource, padding, padding, qrWidth, qrWidth);
            dctx.fillStyle = '#000080';
            dctx.font = `bold ${fontSize}px Inter, Arial, sans-serif`; dctx.textAlign = 'center';
            dctx.fillText((els.sopTitleInput.value || "SOP DOCUMENT").toUpperCase(), dlCanvas.width / 2, padding + qrWidth + textPaddingTop + (fontSize/2));
            const a = document.createElement('a'); a.href = dlCanvas.toDataURL("image/png");
            a.download = `${(els.sopTitleInput.value || "SOP")}_QR.png`; a.click();
        };

        // --- GOOGLE DRIVE UPLOAD LOGIC (FIXED) ---
        async function uploadToDrive(blob) {
            els.loadingText.innerText = "Connecting to Google Drive...";
            els.loading.classList.remove('hidden');
            
            const tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID, 
                scope: 'https://www.googleapis.com/auth/drive.file',
                callback: async (resp) => {
                    if (resp.error !== undefined) {
                        els.loading.classList.add('hidden');
                        showModal("Error", "Authentication failed: " + resp.error);
                        return;
                    }

                    els.loadingText.innerText = "Uploading to Drive...";
                    
                    const metadata = { 
                        name: `SOP_${els.sopTitleInput.value || 'Doc'}.pdf`, 
                        mimeType: 'application/pdf' 
                    };

                    const reader = new FileReader();
                    reader.onload = async () => {
                        const b64Data = btoa(new Uint8Array(reader.result).reduce((acc, byte) => acc + String.fromCharCode(byte), ''));
                        const boundary = '-------314159265358979323846';
                        const delimiter = "\r\n--" + boundary + "\r\n";
                        const close_delim = "\r\n--" + boundary + "--";
                        
                        const multipartBody = 
                            delimiter + 'Content-Type: application/json; charset=UTF-8\r\n\r\n' + 
                            JSON.stringify(metadata) + 
                            delimiter + 'Content-Type: application/pdf\r\n' + 
                            'Content-Transfer-Encoding: base64\r\n\r\n' + 
                            b64Data + 
                            close_delim;

                        try {
                            const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink', {
                                method: 'POST',
                                headers: { 
                                    'Authorization': 'Bearer ' + resp.access_token, 
                                    'Content-Type': 'multipart/related; boundary=' + boundary 
                                },
                                body: multipartBody
                            });
                            
                            const result = await response.json();
                            els.loading.classList.add('hidden');
                            
                            if (result.webViewLink) {
                                showModal("Uploaded!", "Your document is saved and a QR code is ready.", result.webViewLink);
                            } else {
                                showModal("Upload Error", result.error ? result.error.message : "Failed to get file link.");
                            }
                        } catch (err) {
                            els.loading.classList.add('hidden');
                            showModal("Network Error", "Unable to communicate with Google Drive.");
                        }
                    };
                    reader.readAsArrayBuffer(blob);
                }
            });
            tokenClient.requestAccessToken({ prompt: 'consent' });
        }

        function showModal(title, msg, qr = null) {
            els.modalTitle.innerText = title; els.modalMessage.innerText = msg;
            els.qrSection.classList.toggle('hidden', !qr);
            if (qr) { 
                els.qrContainer.innerHTML = ''; 
                new QRCode(els.qrContainer, { text: qr, width: 160, height: 160, colorDark: "#000080" }); 
                els.qrLinkText.innerText = qr; 
                els.qrTitleText.innerText = els.sopTitleInput.value || "SOP DOCUMENT";
            }
            els.customModal.classList.remove('hidden'); els.customModal.classList.add('flex');
        }

        // Listeners
        els.modalClose.onclick = () => { els.customModal.classList.add('hidden'); els.customModal.classList.remove('flex'); };
        els.tab0.onclick = () => { activeIdx = 0; els.tab0.classList.add('active'); els.tab1.classList.remove('active'); renderAll(); };
        els.tab1.onclick = () => { activeIdx = 1; els.tab1.classList.add('active'); els.tab0.classList.remove('active'); renderAll(); };
        els.resetBtn.onclick = () => { if(confirm("Clear everything?")) { points = []; arrows = []; illustrations = []; warnings = []; actionHistory = []; renderAll(); } };
        els.addManualBtn.onclick = () => { points.push({ px: null, py: null, description: '', isSilent: false, color: '#ef4444', imgIdx: -1 }); renderAll(); };
        els.addWarningBtn.onclick = () => { warnings.push({ text: '' }); renderWarnings(); };

        window.onload = () => {
            lucide.createIcons();
            gapi.load('client', () => {
                gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
            });
        };
    </script>
</body>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eldor SOP Oluşturucu - QR & Drive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- PDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <!-- Google API -->
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .canvas-container { position: relative; display: inline-block; cursor: crosshair; width: 100%; }
        canvas { display: block; max-width: 100%; height: auto; border-radius: 12px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .marker { position: absolute; width: 28px; height: 28px; background: rgba(239, 68, 68, 0.95); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; transform: translate(-50%, -50%); border: 2px solid white; pointer-events: auto; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); z-index: 10; transition: transform 0.2s; }
        .marker:hover { transform: translate(-50%, -50%) scale(1.2); }
        .blue-marker { position: absolute; width: 28px; height: 28px; background: rgba(59, 130, 246, 0.95); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; transform: translate(-50%, -50%); border: 2px solid white; pointer-events: auto; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); z-index: 9; transition: transform 0.2s; }
        .blue-marker:hover { transform: translate(-50%, -50%) scale(1.2); }
        .tool-btn.active { background-color: #000080; color: white; border-color: #000080; }
        .tab-btn.active { border-bottom: 3px solid #000080; color: #000080; font-weight: 700; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        
        #customModal { display: none; }
        #qrContainer canvas { margin: 0 auto; border: 8px solid white; border-radius: 12px; }

        #loginScreen {
            background: linear-gradient(135deg, #000080 0%, #000044 100%);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Giriş Ekranı -->
    <div id="loginScreen" class="fixed inset-0 z-[8000] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl p-10 shadow-2xl space-y-8">
            <div class="text-center space-y-3">
                <div class="w-20 h-20 bg-blue-50 rounded-2xl mx-auto flex items-center justify-center mb-4">
                    <i data-lucide="lock" class="w-10 h-10 text-[#000080]"></i>
                </div>
                <h2 class="text-3xl font-bold text-slate-900">Eldor SOP Paneli</h2>
                <p class="text-slate-500">Yönetici kimlik bilgilerinizle giriş yapın.</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-600 uppercase tracking-wider">Kullanıcı Adı</label>
                    <input type="text" id="usernameInput" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="eldor">
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-600 uppercase tracking-wider">Şifre</label>
                    <input type="password" id="passwordInput" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="••••••••">
                </div>
                <div id="loginError" class="hidden text-red-500 text-sm font-medium text-center bg-red-50 py-2 rounded-lg">
                    Hatalı kullanıcı adı veya şifre!
                </div>
                <button type="submit" class="w-full py-4 bg-[#000080] text-white rounded-xl font-bold shadow-xl hover:bg-blue-900 transition-all active:scale-95">
                    Giriş Yap
                </button>
            </form>
        </div>
    </div>

    <!-- İşlem Göstergesi -->
    <div id="loading" class="loading-overlay hidden">
        <div class="w-14 h-14 border-4 border-[#000080] border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-[#000080] text-lg" id="loadingText">İşlem Yapılıyor...</p>
    </div>

    <!-- Özel Modal UI -->
    <div id="customModal" class="fixed inset-0 bg-black/60 z-[9000] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white rounded-3xl max-w-md w-full p-8 shadow-2xl text-center">
            <h3 id="modalTitle" class="text-2xl font-bold mb-3 text-slate-900">Bilgi</h3>
            <p id="modalMessage" class="text-slate-500 mb-8 leading-relaxed"></p>
            
            <div id="qrSection" class="hidden mb-8 p-6 bg-slate-50 rounded-2xl border border-slate-100">
                <div id="qrContainer" class="flex justify-center mb-4"></div>
                <p class="text-[10px] text-slate-400 mb-4 break-all bg-white p-2 rounded border" id="qrLinkText"></p>
                <button id="downloadQrBtn" class="w-full py-3 bg-white border border-slate-200 rounded-xl text-sm font-bold flex items-center justify-center gap-2 hover:bg-slate-100 transition-colors">
                    <i data-lucide="download" class="w-4 h-4"></i> QR Kodunu İndir
                </button>
            </div>

            <div class="flex flex-col gap-3" id="modalActions">
                <button id="modalClose" class="w-full px-4 py-4 bg-[#000080] text-white rounded-2xl text-base font-bold shadow-lg shadow-blue-900/20 active:scale-95 transition-transform">Kapat</button>
            </div>
        </div>
    </div>

    <!-- Uygulama İçeriği -->
    <div class="max-w-6xl mx-auto space-y-6 blur-sm pointer-events-none transition-all duration-700" id="mainContent">
        <!-- Başlık Paneli (Header) -->
        <div class="flex flex-col md:flex-row items-center gap-6 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            
            <!-- 1. LOGO YÜKLEME -->
            <div onclick="document.getElementById('logoInput').click()" class="w-24 h-24 shrink-0 border-2 border-dashed border-slate-300 rounded-xl flex items-center justify-center cursor-pointer hover:border-[#000080] transition-colors overflow-hidden relative group bg-slate-50">
                <img id="logoPreview" class="hidden w-full h-full object-contain p-2">
                <div id="logoPlaceholder" class="flex flex-col items-center gap-1">
                    <i data-lucide="image" class="w-6 h-6 text-slate-300"></i>
                    <span class="text-[10px] font-bold text-slate-400 uppercase">Logo Yükle</span>
                </div>
                <input type="file" id="logoInput" class="hidden" accept="image/*">
            </div>

            <!-- 2. METİN ALANI -->
            <div class="flex-grow flex flex-col gap-4 w-full">
                <h1 class="text-xl font-bold text-[#000080] mb-1 leading-none">Eldor SOP Oluşturucu</h1>
                
                <div class="flex flex-col gap-3">
                    <input type="text" id="sopTitleInput" class="w-full border-b-2 border-slate-100 focus:border-[#000080] focus:outline-none font-bold text-xl py-1 transition-colors" placeholder="SOP Başlığı (Örn: Paketleme Hattı)">
                    <input type="text" id="sopSubtitleInput" class="w-full text-sm border-b-2 border-slate-50 focus:border-slate-300 focus:outline-none py-1 transition-colors" placeholder="Proje Adı">
                </div>
            </div>

            <!-- 3. SAĞ AKSİYON KULESİ -->
            <div class="flex flex-col gap-3 shrink-0 ml-auto items-end">
                <div class="flex bg-white border border-slate-200 rounded-xl overflow-hidden h-10 shadow-sm">
                    <button id="resetBtn" title="Her şeyi temizle" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:bg-red-50 hover:text-red-500 border-r border-slate-100 transition-all">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                    <button id="logoutBtn" title="Güvenli Çıkış" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:bg-orange-50 hover:text-orange-500 transition-all">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                    </button>
                </div>

                <div class="flex bg-[#000080] rounded-lg shadow-md overflow-hidden h-10">
                    <button id="exportPdfBtn" class="px-5 text-[13px] text-white font-bold hover:bg-[#000066] border-r border-[#ffffff22] transition-all flex items-center gap-2">
                        <i data-lucide="file-text" class="w-4 h-4"></i> PDF İndir
                    </button>
                    <button id="exportDriveBtn" class="px-5 text-[13px] text-white font-bold hover:bg-[#000066] flex items-center gap-2 transition-all">
                        <i data-lucide="hard-drive" class="w-4 h-4 text-green-400"></i> Drive'a Gönder
                    </button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                    <div class="flex border-b border-slate-100 mb-6 gap-6">
                        <button id="tab0" class="tab-btn active px-6 py-3 text-sm font-bold transition-all">Görsel Alanı 1</button>
                        <button id="tab1" class="tab-btn px-6 py-3 text-sm font-bold transition-all">Görsel Alanı 2</button>
                    </div>
                    
                    <div id="uploadArea" onclick="document.getElementById('fileInput').click()" class="bg-slate-50 py-20 rounded-2xl border-2 border-dashed border-slate-200 text-center cursor-pointer hover:bg-slate-100 transition-all">
                        <i data-lucide="image-plus" class="w-8 h-8 text-blue-500 mx-auto mb-4"></i>
                        <p class="font-bold text-slate-600 text-lg">Görsel Yüklemek İçin Tıklayın</p>
                        <input type="file" id="fileInput" class="hidden" accept="image/*">
                    </div>

                    <div id="editorArea" class="hidden space-y-6">
                        <div class="flex items-center justify-between bg-slate-50 p-3 rounded-xl">
                            <div class="flex gap-2">
                                <button id="toolInstruction" class="tool-btn active px-4 py-2 text-xs font-bold rounded-lg border flex items-center gap-2 transition-all">
                                    <i data-lucide="list-ordered" class="w-4 h-4 text-red-500"></i> Talimat Noktası
                                </button>
                                <button id="toolMarker" class="tool-btn px-4 py-2 text-xs font-bold rounded-lg border flex items-center gap-2 transition-all">
                                    <i data-lucide="info" class="w-4 h-4 text-blue-500"></i> Bilgi Noktası
                                </button>
                            </div>
                            <button id="clearImageBtn" class="px-4 py-2 text-xs font-bold rounded-lg border border-red-100 text-red-600 hover:bg-red-50 flex items-center gap-2 transition-all">
                                <i data-lucide="image-minus" class="w-4 h-4"></i> Görseli Kaldır
                            </button>
                        </div>
                        <div class="canvas-container" id="canvasContainer">
                            <canvas id="mainCanvas"></canvas>
                            <div id="markersOverlay" class="absolute inset-0 pointer-events-none"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col h-[500px]">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="font-bold text-[#000080] flex items-center gap-2 text-sm uppercase tracking-wider">Talimat Adımları</h2>
                        <button id="addManualBtn" class="bg-blue-600 text-white text-[11px] px-3 py-1.5 rounded-lg flex items-center gap-2 font-bold shadow-sm">
                            <i data-lucide="plus" class="w-3.5 h-3.5"></i> Ekle
                        </button>
                    </div>
                    <div class="flex-grow overflow-auto pr-2 custom-scrollbar">
                        <table class="w-full text-sm text-left">
                            <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
                        </table>
                        <div id="emptyTableState" class="text-center py-20 text-slate-400">
                            <p class="text-xs">Henüz adım eklenmedi.</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl border border-red-50 shadow-sm">
                    <h2 class="font-bold text-red-600 flex items-center gap-2 text-sm uppercase tracking-wider mb-5">Kritik Uyarılar</h2>
                    <div id="warningsContainer" class="space-y-3"></div>
                    <button id="addWarningBtn" class="mt-5 w-full py-3 border-2 border-dashed border-red-100 text-red-400 text-xs rounded-xl hover:bg-red-50 font-bold flex items-center justify-center gap-2">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i> Yeni Kritik Uyarı
                    </button>
                </div>
            </div>
        </div>
    </div>

    <canvas id="exportCanvas" class="hidden"></canvas>

    <script>
        const GOOGLE_CLIENT_ID = '1078405925531-o68nje98l03ct1e71uvnt2pe086grdiq.apps.googleusercontent.com'; 
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';
        
        let tokenClient;
        let getSavedToken = () => sessionStorage.getItem('eldor_drive_token');
        let saveToken = (t) => sessionStorage.setItem('eldor_drive_token', t);
        let clearToken = () => sessionStorage.removeItem('eldor_drive_token');

        window.activeIdx = 0; 
        window.images = [null, null]; 
        window.companyLogo = null;
        window.points = []; 
        window.warnings = []; 
        window.currentMode = 'instruction';
        
        const ADMIN_U = "eldor", ADMIN_P = "eldor123";

        const els = {
            loginScreen: document.getElementById('loginScreen'),
            loginForm: document.getElementById('loginForm'),
            mainContent: document.getElementById('mainContent'),
            fileInput: document.getElementById('fileInput'),
            logoInput: document.getElementById('logoInput'),
            uploadArea: document.getElementById('uploadArea'),
            editorArea: document.getElementById('editorArea'),
            mainCanvas: document.getElementById('mainCanvas'),
            markersOverlay: document.getElementById('markersOverlay'),
            tableBody: document.getElementById('tableBody'),
            emptyTableState: document.getElementById('emptyTableState'),
            warningsContainer: document.getElementById('warningsContainer'),
            sopTitleInput: document.getElementById('sopTitleInput'),
            sopSubtitleInput: document.getElementById('sopSubtitleInput'),
            logoPreview: document.getElementById('logoPreview'),
            logoPlaceholder: document.getElementById('logoPlaceholder'),
            loading: document.getElementById('loading'),
            loadingText: document.getElementById('loadingText'),
            customModal: document.getElementById('customModal'),
            modalTitle: document.getElementById('modalTitle'),
            modalMessage: document.getElementById('modalMessage'),
            qrSection: document.getElementById('qrSection'),
            qrContainer: document.getElementById('qrContainer'),
            qrLinkText: document.getElementById('qrLinkText'),
            downloadQrBtn: document.getElementById('downloadQrBtn'),
            exportPdfBtn: document.getElementById('exportPdfBtn'),
            exportDriveBtn: document.getElementById('exportDriveBtn'),
            resetBtn: document.getElementById('resetBtn'),
            logoutBtn: document.getElementById('logoutBtn'),
            addManualBtn: document.getElementById('addManualBtn'),
            addWarningBtn: document.getElementById('addWarningBtn'),
            toolInstruction: document.getElementById('toolInstruction'),
            toolMarker: document.getElementById('toolMarker'),
            tabBtns: [document.getElementById('tab0'), document.getElementById('tab1')]
        };

        const ctx = els.mainCanvas.getContext('2d');

        els.loginForm.onsubmit = (e) => {
            e.preventDefault();
            if (document.getElementById('usernameInput').value === ADMIN_U && document.getElementById('passwordInput').value === ADMIN_P) {
                els.loginScreen.classList.add('hidden');
                els.mainContent.classList.remove('blur-sm', 'pointer-events-none');
            } else {
                document.getElementById('loginError').classList.remove('hidden');
                setTimeout(() => document.getElementById('loginError').classList.add('hidden'), 3000);
            }
        };

        els.logoutBtn.onclick = () => { if(confirm("Çıkış yapmak istediğinize emin misiniz?")) { clearToken(); location.reload(); } };

        function showModal(title, msg, qr = null) {
            els.modalTitle.innerText = title; els.modalMessage.innerText = msg;
            els.qrSection.classList.toggle('hidden', !qr);
            if (qr) {
                els.qrContainer.innerHTML = '';
                new QRCode(els.qrContainer, { text: qr, width: 160, height: 160, colorDark: "#000080" });
                els.qrLinkText.innerText = qr;
            }
            els.customModal.style.display = 'flex';
        }
        document.getElementById('modalClose').onclick = () => els.customModal.style.display = 'none';

        async function getOrCreateFolder(accessToken, folderName) {
            const query = `name='${folderName.replace(/'/g, "\\'")}' and mimeType='application/vnd.google-apps.folder' and trashed=false`;
            const search = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&fields=files(id,name)`, { headers: { 'Authorization': 'Bearer ' + accessToken } });
            const result = await search.json();
            if (result.files?.length > 0) return result.files[0].id;
            const create = await fetch('https://www.googleapis.com/drive/v3/files', { method: 'POST', headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' }, body: JSON.stringify({ name: folderName, mimeType: 'application/vnd.google-apps.folder' }) });
            const newFolder = await create.json();
            return newFolder.id;
        }

        async function uploadToGoogleDrive(blob) {
            const savedToken = getSavedToken();
            if (savedToken) { executeUpload(savedToken, blob); return; }
            tokenClient.callback = (resp) => {
                if (resp.error) return;
                saveToken(resp.access_token);
                executeUpload(resp.access_token, blob);
            };
            tokenClient.requestAccessToken({ prompt: '' });
        }

        async function executeUpload(accessToken, blob) {
            els.loading.classList.remove('hidden');
            try {
                const projName = els.sopSubtitleInput.value.trim() || "Genel SOP Projeleri";
                const folderId = await getOrCreateFolder(accessToken, projName);
                const metadata = { name: `SOP_${els.sopTitleInput.value || 'Dokuman'}.pdf`, mimeType: 'application/pdf', parents: [folderId] };
                const reader = new FileReader();
                reader.readAsArrayBuffer(blob);
                reader.onload = async (e) => {
                    const b64Data = btoa(new Uint8Array(e.target.result).reduce((acc, byte) => acc + String.fromCharCode(byte), ''));
                    const boundary = '-------314';
                    const multipartBody = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n--${boundary}\r\nContent-Type: application/pdf\r\nContent-Transfer-Encoding: base64\r\n\r\n${b64Data}\r\n--${boundary}--`;
                    const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink', { method: 'POST', headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'multipart/related; boundary=' + boundary }, body: multipartBody });
                    const fileData = await response.json();
                    els.loading.classList.add('hidden');
                    if (response.ok) showModal("Başarıyla Yüklendi", `'${projName}' klasörüne aktarıldı.`, fileData.webViewLink);
                    else { clearToken(); uploadToGoogleDrive(blob); }
                };
            } catch (err) { els.loading.classList.add('hidden'); showModal("Hata", "İşlem sırasında bir sorun oluştu."); }
        }

        els.tabBtns.forEach((btn, idx) => btn.onclick = () => { window.activeIdx = idx; els.tabBtns.forEach((b, i) => b.classList.toggle('active', i === idx)); renderAll(); });
        
        els.logoInput.onchange = (e) => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = (ev) => {
                const i = new Image(); i.onload = () => {
                    window.companyLogo = i; els.logoPreview.src = ev.target.result;
                    els.logoPreview.classList.remove('hidden'); els.logoPlaceholder.classList.add('hidden');
                }; i.src = ev.target.result;
            }; r.readAsDataURL(f);
        };

        els.fileInput.onchange = (e) => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = (ev) => {
                const i = new Image(); i.onload = () => { window.images[window.activeIdx] = i; renderAll(); };
                i.src = ev.target.result;
            }; r.readAsDataURL(f);
        };

        els.mainCanvas.onclick = (e) => {
            if (!window.images[window.activeIdx]) return;
            const rect = els.mainCanvas.getBoundingClientRect();
            window.points.push({ px: ((e.clientX - rect.left) / rect.width) * 100, py: ((e.clientY - rect.top) / rect.height) * 100, description: '', isSilent: window.currentMode === 'marker', imgIdx: window.activeIdx, isManual: false });
            renderAll();
        };

        function renderAll() {
            const img = window.images[window.activeIdx];
            if (img) {
                els.uploadArea.classList.add('hidden'); els.editorArea.classList.remove('hidden');
                els.mainCanvas.width = 1200; els.mainCanvas.height = img.height * (1200 / img.width);
                ctx.drawImage(img, 0, 0, 1200, els.mainCanvas.height);
            } else {
                els.uploadArea.classList.remove('hidden'); els.editorArea.classList.add('hidden');
            }
            els.markersOverlay.innerHTML = ''; els.tableBody.innerHTML = '';
            let ic = 0, mc = 0;
            window.points.forEach((p, idx) => {
                if (!p.isSilent) ic++; else mc++;
                if (p.imgIdx === window.activeIdx && !p.isManual) {
                    const m = document.createElement('div'); m.className = p.isSilent ? 'blue-marker' : 'marker'; m.innerText = p.isSilent ? mc : ic;
                    m.style.left = p.px + '%'; m.style.top = p.py + '%';
                    m.onclick = (ev) => { ev.stopPropagation(); window.points.splice(idx, 1); renderAll(); };
                    els.markersOverlay.appendChild(m);
                }
                if (!p.isSilent) {
                    const tr = document.createElement('tr'); tr.className = "group hover:bg-slate-50 border-b";
                    tr.innerHTML = `<td class="py-3 px-2 align-top"><span class="w-6 h-6 rounded-full flex items-center justify-center font-bold text-white text-[10px] ${p.isManual ? 'bg-blue-500' : 'bg-red-500'}">${ic}</span></td>
                    <td class="py-2 px-2"><textarea class="w-full bg-transparent border-0 focus:ring-0 text-slate-700 text-xs resize-none outline-none" rows="2" oninput="window.points[${idx}].description=this.value">${p.description}</textarea></td>
                    <td class="py-2 px-2 text-right"><button onclick="window.points.splice(${idx}, 1); renderAll();" class="text-slate-300 hover:text-red-500"><i data-lucide="x" class="w-4 h-4"></i></button></td>`;
                    els.tableBody.appendChild(tr);
                }
            });
            lucide.createIcons();
        }

        async function createPdfBlob() {
            const canv = document.getElementById('exportCanvas');
            const ex = canv.getContext('2d');
            canv.width = 1240; canv.height = 1754; 
            ex.fillStyle = 'white'; ex.fillRect(0, 0, 1240, 1754);
            if (window.companyLogo) { const s = Math.min(150/window.companyLogo.width, 150/window.companyLogo.height); ex.drawImage(window.companyLogo, 60, 50, window.companyLogo.width*s, window.companyLogo.height*s); }
            ex.fillStyle = '#000080'; ex.font = 'bold 40px Arial'; ex.fillText(els.sopTitleInput.value.toUpperCase() || 'SOP DOKÜMANI', 220, 100);
            ex.fillStyle = '#64748b'; ex.font = '24px Arial'; ex.fillText(els.sopSubtitleInput.value || '', 220, 140);
            const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
            pdf.addImage(canv.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 210, 297);
            return pdf.output('blob');
        }

        els.exportPdfBtn.onclick = async () => { 
            els.loading.classList.remove('hidden'); 
            const blob = await createPdfBlob(); 
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = "SOP_Dokuman.pdf"; a.click();
            els.loading.classList.add('hidden');
        };

        els.exportDriveBtn.onclick = async () => { const blob = await createPdfBlob(); uploadToGoogleDrive(blob); };
        els.addManualBtn.onclick = () => { window.points.push({ px: null, py: null, description: '', isSilent: false, imgIdx: -1, isManual: true }); renderAll(); };
        els.resetBtn.onclick = () => { if(confirm("Tüm veriler temizlenecek?")) { window.points=[]; window.images=[null,null]; window.companyLogo=null; els.logoPreview.classList.add('hidden'); els.logoPlaceholder.classList.remove('hidden'); renderAll(); } };
        els.toolInstruction.onclick = () => { window.currentMode = 'instruction'; els.toolInstruction.classList.add('active'); els.toolMarker.classList.remove('active'); };
        els.toolMarker.onclick = () => { window.currentMode = 'marker'; els.toolMarker.classList.add('active'); els.toolInstruction.classList.remove('active'); };
        els.addWarningBtn.onclick = () => { window.warnings.push({ text: '' }); renderWarnings(); };

        function renderWarnings() {
            els.warningsContainer.innerHTML = '';
            window.warnings.forEach((w, i) => {
                const d = document.createElement('div'); d.className = "flex gap-2 bg-red-50 p-2 rounded border border-red-100";
                d.innerHTML = `<input type="text" class="flex-grow bg-transparent text-xs outline-none" value="${w.text}" oninput="window.warnings[${i}].text=this.value"><button onclick="window.warnings.splice(${i}, 1); renderWarnings();" class="text-red-400">&times;</button>`;
                els.warningsContainer.appendChild(d);
            });
        }

        els.downloadQrBtn.onclick = () => {
            const qrc = els.qrContainer.querySelector('canvas');
            if (qrc) {
                const a = document.createElement('a'); a.href = qrc.toDataURL("image/png");
                a.download = `${(els.sopTitleInput.value || "SOP")}_QR.png`; a.click();
            }
        };

        window.onload = () => {
            lucide.createIcons();
            gapi.load('client', () => { gapi.client.init({ discoveryDocs: [DISCOVERY_DOC] }); });
            tokenClient = google.accounts.oauth2.initTokenClient({ client_id: GOOGLE_CLIENT_ID, scope: SCOPES, callback: '' });
        };
    </script>
</body>
</html>

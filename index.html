<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eldor SOP Creator - QR & Drive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .canvas-container { position: relative; display: inline-block; cursor: crosshair; width: 100%; background: #eee; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
        canvas { display: block; max-width: 100%; height: auto; }
        .marker { position: absolute; width: 28px; height: 28px; background: rgba(239, 68, 68, 0.95); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; transform: translate(-50%, -50%); border: 2px solid white; pointer-events: auto; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); z-index: 10; }
        .blue-marker { position: absolute; width: 28px; height: 28px; background: rgba(59, 130, 246, 0.95); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; transform: translate(-50%, -50%); border: 2px solid white; pointer-events: auto; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); z-index: 9; }
        .tool-btn.active { background-color: #000080; color: white; border-color: #000080; }
        .tab-btn.active { border-bottom: 3px solid #000080; color: #000080; font-weight: 700; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        #loginScreen { background: linear-gradient(135deg, #000080 0%, #000044 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Login Screen -->
    <div id="loginScreen" class="fixed inset-0 z-[8000] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl p-10 shadow-2xl space-y-8">
            <div class="text-center space-y-3">
                <div class="w-20 h-20 bg-blue-50 rounded-2xl mx-auto flex items-center justify-center mb-4">
                    <i data-lucide="lock" class="w-10 h-10 text-[#000080]"></i>
                </div>
                <h2 class="text-3xl font-bold text-slate-900">Eldor SOP Panel</h2>
                <p class="text-slate-500">Sign in with your administrator credentials.</p>
            </div>
            <form id="loginForm" class="space-y-5">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Username</label>
                    <input type="text" id="usernameInput" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Enter username">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Password</label>
                    <input type="password" id="passwordInput" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="••••••••">
                </div>
                <div id="loginError" class="hidden text-red-500 text-sm font-medium text-center bg-red-50 py-2 rounded-lg">Invalid username or password!</div>
                <button type="submit" class="w-full py-4 bg-[#000080] text-white rounded-xl font-bold shadow-xl hover:bg-blue-900 transition-all active:scale-95">Login</button>
            </form>
        </div>
    </div>

    <!-- Loading Indicator -->
    <div id="loading" class="loading-overlay hidden">
        <div class="w-14 h-14 border-4 border-[#000080] border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-[#000080] text-lg" id="loadingText">Processing...</p>
    </div>

    <!-- Modal UI -->
    <div id="customModal" class="fixed inset-0 bg-black/60 z-[9000] hidden items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white rounded-3xl max-w-md w-full p-8 shadow-2xl text-center">
            <h3 id="modalTitle" class="text-2xl font-bold mb-3 text-slate-900">Information</h3>
            <p id="modalMessage" class="text-slate-500 mb-8 leading-relaxed"></p>
            <div id="qrSection" class="hidden mb-8 p-6 bg-slate-50 rounded-2xl border border-slate-100">
                <div id="qrContainer" class="flex justify-center mb-1"></div>
                <p id="qrTitleText" class="font-bold text-[#000080] text-xs w-[160px] mx-auto text-center mb-4 uppercase tracking-tighter"></p>
                <p class="text-[10px] text-slate-400 mb-4 break-all bg-white p-2 rounded border" id="qrLinkText"></p>
                <button id="downloadQrBtn" class="w-full py-3 bg-white border border-slate-200 rounded-xl text-sm font-bold flex items-center justify-center gap-2">
                    <i data-lucide="download" class="w-4 h-4"></i> Download QR Code
                </button>
            </div>
            <button id="modalClose" class="w-full px-4 py-4 bg-[#000080] text-white rounded-2xl text-base font-bold shadow-lg active:scale-95 transition-transform">Close</button>
        </div>
    </div>

    <!-- App Content -->
    <div class="max-w-6xl mx-auto space-y-6 blur-sm pointer-events-none transition-all duration-700" id="mainContent">
        <!-- Top Panel -->
        <div class="flex flex-col md:flex-row items-center gap-6 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <!-- Logo -->
            <div onclick="document.getElementById('logoInput').click()" class="w-24 h-24 shrink-0 border-2 border-dashed border-slate-300 rounded-xl flex items-center justify-center cursor-pointer hover:border-[#000080] transition-colors overflow-hidden relative group bg-slate-50">
                <img id="logoPreview" class="hidden w-full h-full object-contain p-2">
                <div id="logoPlaceholder" class="flex flex-col items-center gap-1">
                    <i data-lucide="image" class="w-6 h-6 text-slate-300"></i>
                    <span class="text-[10px] font-bold text-slate-400 uppercase">Logo</span>
                </div>
                <input type="file" id="logoInput" class="hidden" accept="image/*">
            </div>

            <!-- Titles -->
            <div class="flex-grow flex flex-col gap-4 w-full">
                <input type="text" id="sopTitleInput" class="w-full border-b-2 border-slate-100 focus:border-[#000080] focus:outline-none font-bold text-2xl py-1 transition-colors text-[#000080]" placeholder="SOP TITLE">
                <input type="text" id="sopSubtitleInput" class="w-full text-base border-b-2 border-slate-300 focus:border-slate-500 focus:outline-none py-1 transition-colors text-slate-500 font-medium" placeholder="PROJECT NAME">
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col gap-3 shrink-0 ml-auto items-end">
                <div class="flex bg-[#000080] rounded-lg shadow-md overflow-hidden h-12">
                    <button id="exportPdfBtn" class="px-6 text-[13px] text-white font-bold hover:bg-[#000066] border-r border-[#ffffff22] flex items-center gap-2">
                        <i data-lucide="file-text" class="w-4 h-4"></i> Export PDF
                    </button>
                    <button id="exportDriveBtn" class="px-6 text-[13px] text-white font-bold hover:bg-[#000066] flex items-center gap-2">
                        <i data-lucide="hard-drive" class="w-4 h-4 text-green-400"></i> Send to Drive
                    </button>
                </div>
                <button id="resetBtn" class="text-xs text-red-500 font-bold hover:underline px-2">Reset Data</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left: Editor Area -->
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                    <div class="flex border-b border-slate-100 mb-6 gap-6">
                        <button id="tab0" class="tab-btn active px-6 py-3 text-sm font-bold transition-all">Image Area 1</button>
                        <button id="tab1" class="tab-btn px-6 py-3 text-sm font-bold transition-all">Image Area 2</button>
                    </div>
                    
                    <div id="uploadArea" onclick="document.getElementById('fileInput').click()" class="bg-slate-50 py-24 rounded-2xl border-2 border-dashed border-slate-200 text-center cursor-pointer hover:bg-slate-100 transition-all">
                        <i data-lucide="image-plus" class="w-10 h-10 text-blue-500 mx-auto mb-4"></i>
                        <p class="font-bold text-slate-600 text-lg">Click to Upload Image</p>
                        <input type="file" id="fileInput" class="hidden" accept="image/*">
                    </div>

                    <div id="editorArea" class="hidden space-y-6">
                        <div class="flex items-center justify-between bg-slate-100 p-3 rounded-xl border border-slate-200">
                            <div class="flex gap-2">
                                <button id="toolInstruction" class="tool-btn active px-4 py-2 text-xs font-bold rounded-lg border flex items-center gap-2 transition-all">
                                    <div class="w-3 h-3 rounded-full bg-red-500"></div> Instruction Point
                                </button>
                                <button id="toolMarker" class="tool-btn px-4 py-2 text-xs font-bold rounded-lg border flex items-center gap-2 transition-all">
                                    <div class="w-3 h-3 rounded-full bg-blue-500"></div> Information Point
                                </button>
                            </div>
                            <button onclick="clearCurrentImage()" class="px-4 py-2 text-xs font-bold rounded-lg text-red-600 hover:bg-red-50 flex items-center gap-2 transition-all">
                                <i data-lucide="trash-2" class="w-4 h-4"></i> Remove Image
                            </button>
                        </div>
                        <div class="canvas-container" id="canvasContainer">
                            <canvas id="mainCanvas"></canvas>
                            <div id="markersOverlay" class="absolute inset-0 pointer-events-none"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Information Input -->
            <div class="space-y-6">
                <!-- Instruction Steps List -->
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col h-[260px]">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="font-bold text-[#000080] text-sm uppercase tracking-wider flex items-center gap-2">
                            <i data-lucide="list-checks" class="w-4 h-4"></i> INSTRUCTION STEPS
                        </h2>
                        <button id="addManualBtn" class="bg-blue-600 text-white text-[11px] px-3 py-1.5 rounded-lg font-bold shadow-sm hover:bg-blue-700">
                             + Add Manual Step
                        </button>
                    </div>
                    <div class="flex-grow overflow-auto pr-2 custom-scrollbar">
                        <table class="w-full text-sm text-left border-collapse">
                            <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
                        </table>
                        <div id="emptyTableState" class="text-center py-10 text-slate-400">
                            <p class="text-xs">No steps added yet.</p>
                        </div>
                    </div>
                </div>

                <!-- Warnings Area -->
                <div class="bg-white p-6 rounded-2xl border border-red-50 shadow-sm">
                    <h2 class="font-bold text-red-600 text-sm uppercase tracking-wider mb-5 flex items-center gap-2">
                        <i data-lucide="alert-triangle" class="w-4 h-4"></i> CRITICAL WARNINGS
                    </h2>
                    <div id="warningsContainer" class="space-y-3"></div>
                    <button id="addWarningBtn" class="mt-5 w-full py-3 border-2 border-dashed border-red-100 text-red-400 text-xs rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-red-50">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i> Add New Warning
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Export Canvas -->
    <canvas id="exportCanvas" class="hidden"></canvas>

    <script>
        const GOOGLE_CLIENT_ID = '1078405925531-o68nje98l03ct1e71uvnt2pe086grdiq.apps.googleusercontent.com'; 
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';
        
        let tokenClient;
        let getSavedToken = () => sessionStorage.getItem('eldor_drive_token');
        let saveToken = (t) => sessionStorage.setItem('eldor_drive_token', t);
        let clearToken = () => sessionStorage.removeItem('eldor_drive_token');

        window.activeIdx = 0; 
        window.images = [null, null]; 
        window.companyLogo = null;
        window.points = []; 
        window.warnings = []; 
        window.currentMode = 'instruction';
        
        const ADMIN_U = "eldor", ADMIN_P = "eldor123";

        const els = {
            loginScreen: document.getElementById('loginScreen'),
            loginForm: document.getElementById('loginForm'),
            mainContent: document.getElementById('mainContent'),
            fileInput: document.getElementById('fileInput'),
            logoInput: document.getElementById('logoInput'),
            uploadArea: document.getElementById('uploadArea'),
            editorArea: document.getElementById('editorArea'),
            mainCanvas: document.getElementById('mainCanvas'),
            markersOverlay: document.getElementById('markersOverlay'),
            tableBody: document.getElementById('tableBody'),
            emptyTableState: document.getElementById('emptyTableState'),
            warningsContainer: document.getElementById('warningsContainer'),
            sopTitleInput: document.getElementById('sopTitleInput'),
            sopSubtitleInput: document.getElementById('sopSubtitleInput'),
            logoPreview: document.getElementById('logoPreview'),
            logoPlaceholder: document.getElementById('logoPlaceholder'),
            loading: document.getElementById('loading'),
            loadingText: document.getElementById('loadingText'),
            customModal: document.getElementById('customModal'),
            modalTitle: document.getElementById('modalTitle'),
            modalMessage: document.getElementById('modalMessage'),
            qrSection: document.getElementById('qrSection'),
            qrContainer: document.getElementById('qrContainer'),
            qrTitleText: document.getElementById('qrTitleText'),
            qrLinkText: document.getElementById('qrLinkText'),
            exportPdfBtn: document.getElementById('exportPdfBtn'),
            exportDriveBtn: document.getElementById('exportDriveBtn'),
            downloadQrBtn: document.getElementById('downloadQrBtn'),
            resetBtn: document.getElementById('resetBtn'),
            addManualBtn: document.getElementById('addManualBtn'),
            addWarningBtn: document.getElementById('addWarningBtn'),
            toolInstruction: document.getElementById('toolInstruction'),
            toolMarker: document.getElementById('toolMarker'),
            tabBtns: [document.getElementById('tab0'), document.getElementById('tab1')]
        };

        const ctx = els.mainCanvas.getContext('2d');

        // Login Logic
        els.loginForm.onsubmit = (e) => {
            e.preventDefault();
            if (document.getElementById('usernameInput').value === ADMIN_U && document.getElementById('passwordInput').value === ADMIN_P) {
                els.loginScreen.classList.add('hidden');
                els.mainContent.classList.remove('blur-sm', 'pointer-events-none');
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        };

        function showModal(title, msg, qr = null) {
            els.modalTitle.innerText = title; els.modalMessage.innerText = msg;
            els.qrSection.classList.toggle('hidden', !qr);
            if (qr) {
                els.qrContainer.innerHTML = '';
                new QRCode(els.qrContainer, { 
                    text: qr, 
                    width: 160, 
                    height: 160, 
                    colorDark: "#000080",
                    useSVG: false
                });
                els.qrLinkText.innerText = qr;
                els.qrTitleText.innerText = els.sopTitleInput.value || "SOP DOCUMENT";
            }
            els.customModal.classList.remove('hidden');
            els.customModal.classList.add('flex');
        }

        document.getElementById('modalClose').onclick = () => {
            els.customModal.classList.add('hidden');
            els.customModal.classList.remove('flex');
        };

        // QR Code Download
        els.downloadQrBtn.onclick = () => {
            const qrSource = els.qrContainer.querySelector('canvas') || els.qrContainer.querySelector('img');
            if (!qrSource) return;

            const sopTitle = (els.sopTitleInput.value || "SOP DOCUMENT").toUpperCase();
            const dlCanvas = document.createElement('canvas');
            const dctx = dlCanvas.getContext('2d');
            const qrWidth = 160;
            const padding = 20; 
            const textPaddingTop = 10;
            const fontSize = 14;
            
            dlCanvas.width = qrWidth + (padding * 2);
            dlCanvas.height = qrWidth + (padding * 2) + fontSize + textPaddingTop;
            
            dctx.fillStyle = 'white';
            dctx.fillRect(0, 0, dlCanvas.width, dlCanvas.height);
            dctx.drawImage(qrSource, padding, padding, qrWidth, qrWidth);
            dctx.fillStyle = '#000080';
            dctx.font = `bold ${fontSize}px Inter, Arial, sans-serif`;
            dctx.textAlign = 'center';
            
            let currentFontSize = fontSize;
            while (dctx.measureText(sopTitle).width > qrWidth && currentFontSize > 8) {
                currentFontSize--;
                dctx.font = `bold ${currentFontSize}px Inter, Arial, sans-serif`;
            }
            dctx.fillText(sopTitle, dlCanvas.width / 2, padding + qrWidth + textPaddingTop + (currentFontSize/2));

            const a = document.createElement('a');
            a.href = dlCanvas.toDataURL("image/png");
            a.download = `${(els.sopTitleInput.value || "SOP")}_QR.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        // UI Interactions
        els.tabBtns.forEach((btn, idx) => btn.onclick = () => { window.activeIdx = idx; els.tabBtns.forEach((b, i) => b.classList.toggle('active', i === idx)); renderAll(); });
        
        els.logoInput.onchange = (e) => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = (ev) => {
                const i = new Image(); i.onload = () => {
                    window.companyLogo = i; els.logoPreview.src = ev.target.result;
                    els.logoPreview.classList.remove('hidden'); els.logoPlaceholder.classList.add('hidden');
                }; i.src = ev.target.result;
            }; r.readAsDataURL(f);
        };

        els.fileInput.onchange = (e) => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = (ev) => {
                const i = new Image(); i.onload = () => { window.images[window.activeIdx] = i; renderAll(); };
                i.src = ev.target.result;
            }; r.readAsDataURL(f);
        };

        function clearCurrentImage() {
            window.images[window.activeIdx] = null;
            window.points = window.points.filter(p => p.imgIdx !== window.activeIdx);
            renderAll();
        }

        els.mainCanvas.onclick = (e) => {
            if (!window.images[window.activeIdx]) return;
            const rect = els.mainCanvas.getBoundingClientRect();
            window.points.push({ 
                px: ((e.clientX - rect.left) / rect.width) * 100, 
                py: ((e.clientY - rect.top) / rect.height) * 100, 
                description: '', 
                isSilent: window.currentMode === 'marker', 
                imgIdx: window.activeIdx, 
                isManual: false 
            });
            renderAll();
        };

        function renderAll() {
            const img = window.images[window.activeIdx];
            if (img) {
                els.uploadArea.classList.add('hidden'); 
                els.editorArea.classList.remove('hidden');
                els.mainCanvas.width = 1200; 
                els.mainCanvas.height = img.height * (1200 / img.width);
                ctx.drawImage(img, 0, 0, 1200, els.mainCanvas.height);
            } else {
                els.uploadArea.classList.remove('hidden'); 
                els.editorArea.classList.add('hidden');
            }
            
            els.markersOverlay.innerHTML = ''; 
            els.tableBody.innerHTML = '';
            let ic = 0, mc = 0;
            
            window.points.forEach((p, idx) => {
                if (!p.isSilent) ic++; else mc++;
                
                if (p.imgIdx === window.activeIdx && !p.isManual) {
                    const m = document.createElement('div'); 
                    m.className = p.isSilent ? 'blue-marker' : 'marker'; 
                    m.innerText = p.isSilent ? mc : ic;
                    m.style.left = p.px + '%'; m.style.top = p.py + '%';
                    m.onclick = (ev) => { ev.stopPropagation(); window.points.splice(idx, 1); renderAll(); };
                    els.markersOverlay.appendChild(m);
                }
                
                if (!p.isSilent) {
                    const tr = document.createElement('tr'); tr.className = "group hover:bg-slate-50";
                    tr.innerHTML = `
                        <td class="py-3 px-2 align-top"><span class="w-6 h-6 rounded-full flex items-center justify-center font-bold text-white text-[11px] ${p.isManual ? 'bg-blue-600' : 'bg-red-500'}">${ic}</span></td>
                        <td class="py-2 px-2"><textarea class="w-full bg-transparent border-0 focus:ring-0 text-slate-700 text-sm resize-none outline-none font-medium" rows="2" placeholder="Write step description..." oninput="window.points[${idx}].description=this.value">${p.description}</textarea></td>
                        <td class="py-2 px-2 text-right"><button onclick="window.points.splice(${idx}, 1); renderAll();" class="text-slate-300 hover:text-red-500 transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button></td>`;
                    els.tableBody.appendChild(tr);
                }
            });
            
            els.emptyTableState.classList.toggle('hidden', ic > 0);
            lucide.createIcons();
        }

        // PDF Generation
        async function createPdfBlob() {
            const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
            const pageWidth = 210;
            const pageHeight = 297;
            
            const exportCanvas = document.createElement('canvas');
            const ex = exportCanvas.getContext('2d');
            exportCanvas.width = 1240;
            exportCanvas.height = 1754;

            let currentY = 0;

            const renderPageContent = () => {
                ex.fillStyle = 'white';
                ex.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
                currentY = 60;

                // 1. Header
                if (window.companyLogo) {
                    const logoRatio = window.companyLogo.width / window.companyLogo.height;
                    const logoHeight = 80;
                    const logoWidth = logoHeight * logoRatio;
                    ex.drawImage(window.companyLogo, 60, currentY, logoWidth, logoHeight);
                }

                ex.fillStyle = '#000080';
                ex.font = 'bold 44px Arial';
                ex.textAlign = 'left';
                ex.fillText(els.sopTitleInput.value.toUpperCase() || 'SOP DOCUMENT', 300, currentY + 45);

                ex.fillStyle = '#64748b';
                ex.font = '500 28px Arial';
                ex.fillText(els.sopSubtitleInput.value || '', 300, currentY + 85);

                currentY += 130;
                ex.strokeStyle = '#000080';
                ex.lineWidth = 3;
                ex.beginPath();
                ex.moveTo(60, currentY);
                ex.lineTo(1180, currentY);
                ex.stroke();

                currentY += 40;

                // 2. Images
                for (let i = 0; i < 2; i++) {
                    const img = window.images[i];
                    if (!img) continue;

                    const drawWidth = 600; 
                    const drawHeight = (img.height * drawWidth) / img.width;
                    const drawX = (1240 - drawWidth) / 2;

                    ex.strokeStyle = '#e2e8f0';
                    ex.lineWidth = 2;
                    ex.strokeRect(drawX, currentY, drawWidth, drawHeight);
                    ex.drawImage(img, drawX, currentY, drawWidth, drawHeight);

                    let ic = 0, mc = 0;
                    window.points.forEach(p => {
                        if (!p.isSilent) ic++; else mc++;
                        if (p.imgIdx === i && !p.isManual) {
                            const mx = drawX + (p.px / 100) * drawWidth;
                            const my = currentY + (p.py / 100) * drawHeight;
                            ex.beginPath();
                            ex.arc(mx, my, 18, 0, Math.PI * 2);
                            ex.fillStyle = p.isSilent ? '#3b82f6' : '#ef4444';
                            ex.fill();
                            ex.strokeStyle = 'white';
                            ex.lineWidth = 3;
                            ex.stroke();
                            ex.fillStyle = 'white';
                            ex.font = 'bold 22px Arial';
                            ex.textAlign = 'center';
                            ex.textBaseline = 'middle';
                            ex.fillText(p.isSilent ? mc : ic, mx, my);
                        }
                    });
                    currentY += drawHeight + 30;
                }

                // 3. Instruction Steps
                ex.fillStyle = '#f1f5f9';
                ex.fillRect(60, currentY, 1120, 50);
                ex.fillStyle = '#000080';
                ex.font = 'bold 30px Arial';
                ex.textAlign = 'left';
                ex.textBaseline = 'middle';
                ex.fillText('INSTRUCTION STEPS', 80, currentY + 25);
                
                currentY += 80;
                
                let ic_list = 0;
                window.points.forEach(p => {
                    if (!p.isSilent) {
                        ic_list++;
                        const circleX = 85;
                        const circleY = currentY + 15;
                        ex.beginPath();
                        ex.arc(circleX, circleY, 20, 0, Math.PI * 2);
                        ex.fillStyle = '#000080';
                        ex.fill();
                        ex.fillStyle = 'white';
                        ex.font = 'bold 22px Arial';
                        ex.textAlign = 'center';
                        ex.textBaseline = 'middle';
                        ex.fillText(ic_list, circleX, circleY);

                        ex.fillStyle = '#334155';
                        ex.font = 'bold 24px Arial';
                        ex.textAlign = 'left';
                        ex.textBaseline = 'top';

                        const description = p.description || "No description provided";
                        const words = description.split(' ');
                        let line = '';
                        const textX = 130;
                        let startY = currentY;

                        for (let n = 0; n < words.length; n++) {
                            let testLine = line + words[n] + ' ';
                            if (ex.measureText(testLine).width > 980 && n > 0) {
                                ex.fillText(line, textX, startY);
                                line = words[n] + ' ';
                                startY += 35;
                            } else {
                                line = testLine;
                            }
                        }
                        ex.fillText(line, textX, startY);
                        currentY = startY + 60;
                    }
                });

                // 4. Critical Warnings (REVİZE: WORD WRAP EKLENDİ)
                if (window.warnings.length > 0) {
                    currentY += 20;
                    ex.fillStyle = '#fef2f2';
                    ex.fillRect(60, currentY, 1120, 50);
                    ex.fillStyle = '#dc2626';
                    ex.font = 'bold 30px Arial';
                    ex.textBaseline = 'middle';
                    ex.fillText('CRITICAL WARNINGS', 80, currentY + 25);
                    
                    currentY += 70;
                    ex.font = '24px Arial';
                    ex.textAlign = 'left';
                    ex.textBaseline = 'top';
                    
                    window.warnings.forEach(w => {
                        ex.fillStyle = '#dc2626';
                        ex.fillText('•', 80, currentY);
                        ex.fillStyle = '#334155';
                        
                        // Uyarı metni kaydırma mantığı
                        const warningText = w.text || "";
                        const words = warningText.split(' ');
                        let line = '';
                        const textX = 110;
                        const maxWidth = 1000;

                        for (let n = 0; n < words.length; n++) {
                            let testLine = line + words[n] + ' ';
                            if (ex.measureText(testLine).width > maxWidth && n > 0) {
                                ex.fillText(line, textX, currentY);
                                line = words[n] + ' ';
                                currentY += 35;
                            } else {
                                line = testLine;
                            }
                        }
                        ex.fillText(line, textX, currentY);
                        currentY += 40;
                    });
                }
            };

            renderPageContent();
            pdf.addImage(exportCanvas.toDataURL('image/jpeg', 1.0), 'JPEG', 0, 0, pageWidth, pageHeight);
            return pdf.output('blob');
        }

        els.exportPdfBtn.onclick = async () => { 
            els.loadingText.innerText = "Generating PDF...";
            els.loading.classList.remove('hidden'); 
            try {
                const blob = await createPdfBlob(); 
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `SOP_${els.sopTitleInput.value.replace(/\s+/g, '_') || 'Document'}.pdf`;
                a.click();
            } finally {
                els.loading.classList.add('hidden');
            }
        };

        els.exportDriveBtn.onclick = async () => { const blob = await createPdfBlob(); uploadToGoogleDrive(blob); };

        els.resetBtn.onclick = () => { 
            if(confirm("Images, instructions, and warnings will be cleared. Do you want to continue?")) { 
                window.points = []; window.images = [null, null]; window.warnings = [];
                renderAll(); renderWarnings();
            } 
        };

        els.addManualBtn.onclick = () => { window.points.push({ px: null, py: null, description: '', isSilent: false, imgIdx: -1, isManual: true }); renderAll(); };
        els.addWarningBtn.onclick = () => { window.warnings.push({ text: '' }); renderWarnings(); };

        function renderWarnings() {
            els.warningsContainer.innerHTML = '';
            window.warnings.forEach((w, i) => {
                const d = document.createElement('div'); d.className = "flex gap-2 bg-red-50 p-2 rounded border border-red-100 items-start";
                // Textarea ile alt satıra geçme desteği ve daha geniş görünüm
                d.innerHTML = `
                    <i data-lucide="alert-circle" class="w-3.5 h-3.5 text-red-500 shrink-0 mt-1"></i>
                    <textarea class="flex-grow bg-transparent text-sm outline-none text-red-700 placeholder-red-300 resize-none overflow-hidden" 
                        placeholder="Enter critical warning here..." 
                        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';window.warnings[${i}].text=this.value"
                        style="height: 24px;">${w.text}</textarea>
                    <button onclick="window.warnings.splice(${i}, 1); renderWarnings();" class="text-red-300 hover:text-red-500 font-bold mt-1">&times;</button>`;
                els.warningsContainer.appendChild(d);
                // Başlangıç yüksekliğini ayarla
                const ta = d.querySelector('textarea');
                ta.style.height = 'auto';
                ta.style.height = ta.scrollHeight + 'px';
            });
            lucide.createIcons();
        }

        async function uploadToGoogleDrive(blob) {
            const savedToken = getSavedToken();
            if (savedToken) { executeUpload(savedToken, blob); return; }
            tokenClient.callback = (resp) => {
                if (resp.error) return;
                saveToken(resp.access_token);
                executeUpload(resp.access_token, blob);
            };
            tokenClient.requestAccessToken({ prompt: '' });
        }

        async function executeUpload(accessToken, blob) {
            els.loadingText.innerText = "Uploading to Drive...";
            els.loading.classList.remove('hidden');
            try {
                const projName = els.sopSubtitleInput.value.trim() || "General SOP Projects";
                const folderId = await getOrCreateFolder(accessToken, projName);
                const metadata = { name: `SOP_${els.sopTitleInput.value || 'Document'}.pdf`, mimeType: 'application/pdf', parents: [folderId] };
                const b64Data = await new Promise(r => {
                    const reader = new FileReader();
                    reader.onload = e => r(btoa(new Uint8Array(e.target.result).reduce((a, b) => a + String.fromCharCode(b), '')));
                    reader.readAsArrayBuffer(blob);
                });
                const boundary = '-------314';
                const multipartBody = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n--${boundary}\r\nContent-Type: application/pdf\r\nContent-Transfer-Encoding: base64\r\n\r\n${b64Data}\r\n--${boundary}--`;
                const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink', { method: 'POST', headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'multipart/related; boundary=' + boundary }, body: multipartBody });
                const fileData = await response.json();
                els.loading.classList.add('hidden');
                if (response.ok) showModal("Successfully Uploaded", `Document moved to '${projName}' folder.`, fileData.webViewLink);
                else { clearToken(); uploadToGoogleDrive(blob); }
            } catch (err) { els.loading.classList.add('hidden'); showModal("Error", "A problem occurred during processing."); }
        }

        async function getOrCreateFolder(accessToken, folderName) {
            const query = `name='${folderName.replace(/'/g, "\\'")}' and mimeType='application/vnd.google-apps.folder' and trashed=false`;
            const search = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&fields=files(id,name)`, { headers: { 'Authorization': 'Bearer ' + accessToken } });
            const result = await search.json();
            if (result.files?.length > 0) return result.files[0].id;
            const create = await fetch('https://www.googleapis.com/drive/v3/files', { method: 'POST', headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' }, body: JSON.stringify({ name: folderName, mimeType: 'application/vnd.google-apps.folder' }) });
            const newFolder = await create.json();
            return newFolder.id;
        }

        els.toolInstruction.onclick = () => { window.currentMode = 'instruction'; els.toolInstruction.classList.add('active'); els.toolMarker.classList.remove('active'); };
        els.toolMarker.onclick = () => { window.currentMode = 'marker'; els.toolMarker.classList.add('active'); els.toolInstruction.classList.remove('active'); };

        window.onload = () => {
            lucide.createIcons();
            gapi.load('client', () => { gapi.client.init({ discoveryDocs: [DISCOVERY_DOC] }); });
            tokenClient = google.accounts.oauth2.initTokenClient({ client_id: GOOGLE_CLIENT_ID, scope: SCOPES, callback: '' });
        };
    </script>
</body>
